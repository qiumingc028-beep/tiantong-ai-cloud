<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Excel批量导入 - 天统AI云中台</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; background:#f5f7fb; margin:0; }
    .header { background:#101827; color:white; padding:24px 40px; display:flex; justify-content:space-between; align-items:center; }
    .wrap { padding:30px 40px; }
    .card { background:white; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.06); margin-bottom:20px; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; background:#101827; color:white; margin-right:6px; }
    input { padding:12px; border:1px solid #cbd5e1; border-radius:8px; }
    table { width:100%; border-collapse:collapse; background:white; margin-top:12px; }
    th, td { padding:12px; border-bottom:1px solid #e5e7eb; text-align:left; }
    .tip { color:#64748b; line-height:1.8; }
    .result { white-space:pre-wrap; background:#f8fafc; padding:16px; border-radius:10px; margin-top:16px; }
    a { color:white; margin-left:16px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Excel批量导入</h1>
      <p>60家店铺每日成交 / 利润 / 广告 / ROI / 订单 / 访客</p>
    </div>
    <div>
      <a href="/">返回驾驶舱</a>
      <a href="/metrics.html">手动录入</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>第一步：准备Excel表头</h2>
      <p class="tip">Excel 第一行必须按下面表头填写。店铺编号要对应系统里的 JD01、JD02、JD03...</p>

      <table>
        <thead>
          <tr>
            <th>店铺编号</th>
            <th>日期</th>
            <th>今日成交</th>
            <th>今日利润</th>
            <th>广告花费</th>
            <th>ROI</th>
            <th>订单数</th>
            <th>访客数</th>
            <th>退款数</th>
            <th>售后数</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>JD01</td>
            <td>2026-06-29</td>
            <td>50000</td>
            <td>15000</td>
            <td>5000</td>
            <td>10</td>
            <td>80</td>
            <td>3000</td>
            <td>3</td>
            <td>2</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>第二步：上传Excel</h2>
      <p class="tip">支持 .xlsx 和 .csv。上传后会自动覆盖同一天、同一个店铺的数据。</p>
      <input id="file" type="file" accept=".xlsx,.csv">
      <button onclick="upload()">上传导入</button>
      <div id="result" class="result"></div>
    </div>
  </div>

<script>
async function upload() {
  const file = document.getElementById('file').files[0];
  const result = document.getElementById('result');

  if (!file) {
    alert('请先选择文件');
    return;
  }

  const form = new FormData();
  form.append('file', file);

  result.innerText = '正在上传导入...';

  const res = await fetch('/api/metrics/import', {
    method: 'POST',
    credentials: 'include',
    body: form
  });

  if (res.status === 401) {
    location.href = '/login.html';
    return;
  }

  const data = await res.json();

  if (!res.ok) {
    result.innerText = '导入失败：' + (data.detail || '未知错误');
    return;
  }

  result.innerText =
    '导入成功：' + data.imported + ' 行\n\n' +
    (data.errors && data.errors.length ? '错误：\n' + data.errors.join('\n') : '无错误');
}
</script>
</body>
</html>
