body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#f4f6f8;color:#111827}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.menu a.disabled{opacity:.5}.topbar{min-height:64px;background:white;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:#64748b;font-size:13px}.pill{border:1px solid #e5e7eb;background:#f8fafc;border-radius:999px;padding:5px 9px}.content{padding:24px}.card{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:18px;margin-bottom:16px}.sub{color:#64748b;line-height:1.8}@media(max-width:760px){.app{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}.auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}</style></head><body class="auth-pending">
<script type="text/plain" data-rbac-protected>
(function(){
  if (window.__tiantongFrontSecurity) return;
  window.__tiantongFrontSecurity = true;
  const ALL_ACCESS = null;
  const ROLE_ACCESS = {
    owner: ALL_ACCESS,
    boss: ALL_ACCESS,
    admin: [
      '/index.html',
      '/control.html',
      '/stores.html',
      '/jd-dashboard.html',
      '/jd-integrations.html',
      '/employee-workspace.html',
      '/employee-capabilities.html',
      '/model-routing.html',
      '/tool-permissions.html',
      '/sop-skill-center.html',
      '/skill-plugin-center.html',
      '/employee-activity-log.html',
      '/task-center.html',
      '/metrics.html',
      '/import.html',
      '/ai-employees.html',
      '/workflows.html',
      '/account-center.html',
      '/template-center.html',
      '/brands.html',
      '/store-groups.html',
      '/ai-assets.html',
      '/settings.html',
    ],
    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    designer: ['/ai-assets.html','/workflows.html'],
    editor: ['/ai-assets.html','/workflows.html'],
    finance: ['/jd-dashboard.html','/metrics.html','/import.html']
  };
  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};
  const rawFetch = window.fetch.bind(window);
  let currentUser = null;
  let redirecting = false;

  function normalizeRole(user){
    const raw = String((user && (user.role_code || user.role)) || '').trim();
    return ROLE_ALIASES[raw] || raw || 'guest';
  }
  function accessFor(role){
    if (role === 'owner') return ALL_ACCESS;
    return Object.prototype.hasOwnProperty.call(ROLE_ACCESS, role) ? ROLE_ACCESS[role] : ['/jd-dashboard.html'];
  }
  function canOpen(role, href){
    if (!href || href === '#' || href.startsWith('/api/')) return true;
    const normalizedHref = href === '/' ? '/index.html' : href;
    const access = accessFor(role);
    return access === ALL_ACCESS || access.includes(normalizedHref);
  }
  function firstAllowed(role){
    const access = accessFor(role);
    return access === ALL_ACCESS ? '/index.html' : (access[0] || '/login.html');
  }
  function currentPath(){
    return location.pathname === '/' ? '/index.html' : location.pathname;
  }
  function clearClientAuth(){
    try { localStorage.removeItem('token'); localStorage.removeItem('tiantong_token'); localStorage.removeItem('session'); localStorage.removeItem('tiantong_session'); sessionStorage.clear(); } catch(e) {}
  }
  function friendlyText(status, detail){
    if (status === 401) return detail || '????????????';
    if (status === 403) return detail || '??????????????????';
    return detail || '???????????';
  }
  function safeRedirect(url){
    if (redirecting) return;
    redirecting = true;
    setTimeout(function(){ location.href = url; }, 450);
  }
  function applyRoleUI(user){
    currentUser = user || currentUser;
    const role = normalizeRole(currentUser);
    document.querySelectorAll('.menu a, .quick a').forEach(function(link){
      const href = link.getAttribute('href') || '';
      const allowed = canOpen(role, href);
      link.style.display = allowed ? '' : 'none';
      link.setAttribute('aria-hidden', allowed ? 'false' : 'true');
    });
    const path = currentPath();
    if (path !== '/login.html' && !canOpen(role, path)) {
      alert('???????????????????????????');
      safeRedirect(firstAllowed(role));
      return;
    }
    document.body.classList.remove('auth-pending');
  }
  async function verifyLogin(){
    try {
      const res = await rawFetch('/api/me', {credentials:'include'});
      if (res.status === 401) {
        clearClientAuth();
        safeRedirect('/login.html');
        return;
      }
      if (!res.ok) throw new Error('????????');
      const user = await res.json();
      applyRoleUI(user);
    } catch(e) {
      document.body.classList.remove('auth-pending');
      const box = document.getElementById('notice') || document.getElementById('pageState') || document.getElementById('state');
      if (box) { box.className = 'state error'; box.innerText = '??????????????????'; }
    }
  }
  window.fetch = async function(input, init){
    const res = await rawFetch(input, init);
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.includes('/api/me') && res.ok) {
      res.clone().json().then(applyRoleUI).catch(function(){});
    }
    if (url.includes('/api/') && res.status === 401) {
      clearClientAuth();
      alert('????????????');
      safeRedirect('/login.html');
    }
    if (url.includes('/api/') && res.status === 403) {
      res.clone().json().then(function(data){ alert(friendlyText(403, data.detail)); }).catch(function(){ alert(friendlyText(403)); });
      clearClientAuth();
      safeRedirect('/login.html');
    }
    return res;
  };
  window.secureLogout = async function(){
    clearClientAuth();
    try { await rawFetch('/api/logout', {method:'POST', credentials:'include'}); } catch(e) {}
    location.href = '/login.html';
  };
  const keepLogoutSafe = setInterval(function(){ window.logout = window.secureLogout; }, 50);
  setTimeout(function(){ clearInterval(keepLogoutSafe); window.logout = window.secureLogout; }, 3000);
  document.addEventListener('DOMContentLoaded', function(){ if (currentUser) applyRoleUI(currentUser); });
  new MutationObserver(function(){ if (currentUser) applyRoleUI(currentUser); }).observe(document.body, {childList:true, subtree:true});
  verifyLogin();
})();
</script>
<div class="app"><aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside><main><header class="topbar"><strong>系统设置</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button data-rbac-action="settings-001">退出登录</button></div></header><section class="content"><div class="card"><h1>系统设置</h1><div class="sub">角色权限、数据源、系统参数和部署配置将在这里集中维护。当前只做前端占位，不修改后端配置。</div></div></section></main></div>
<script type="text/plain" data-rbac-protected>
const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工中心','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏：知识资产中心','/knowledge-center.html'],['系统设置','/settings.html']];function disabledEntry(){alert('账号资料中心入口已预留，等待后端页面路由开放。');return false}function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/settings.html'?'active ':''}${h.startsWith('#')?'disabled':''}" href="${h}" ${h.startsWith('#')?'data-rbac-action="settings-disabled-entry"':''}>${l}</a>`).join('')}function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}async function logout(){await fetch('/api/logout',{method:'POST',credentials:'include'});location.href='/login.html'}async function init(){renderMenu();tick();setInterval(tick,1000);const r=await fetch('/api/me',{credentials:'include'});if(r.status===401){location.href='/login.html';return}const u=await r.json();me.innerText=`${u.display_name} · ${u.role_label||u.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败'}init();
</script>
<script type="text/plain" data-rbac-protected>
TiantongRbac.bindActions({

</script>
