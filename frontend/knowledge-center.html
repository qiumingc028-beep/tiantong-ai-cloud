const menus=[['?????','/index.html'],['??????','/control.html'],['????','/stores.html'],['??60?????','/jd-dashboard.html'],['??????','/jd-integrations.html'],['????','/ads.html'],['??????','/metrics.html'],['Excel??','/import.html'],['AI????','/ai-assets.html'],['AI?????','/workflows.html'],['AI????','/ai-employees.html'],['??????','/account-center.html'],['????','/template-center.html'],['????','/brands.html'],['????','/store-groups.html'],['?????????','/knowledge-center.html'],['????','/settings.html']];

let activeTab='articles',files=[],articles=[],assets={sops:[],prompts:[],bugs:[],courses:[]},selectedFile=null,selectedArticle=null,lastGenerated=null;

async function initShell(){renderMenu();renderTabs();tick();setInterval(tick,1000);const me=await fetch('/api/me',{credentials:'include'});if(!me.ok)return;const u=await me.json();userInfo.innerText=`${u.display_name} и·Ҝ ${u.role_label||u.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`йҸҲе¶…е§ҹйҚЈг„Ұо„ңз”Ҝ?и·Ҝ йҸҒзүҲеөҒжҗҙ?${h.database} и·Ҝ Redis ${h.redis}`:'з»ҜиҚӨзІәйҗҳиҲөпҝҪдҪҪе№ҸйҚҷж §гҒ‘з’җ?;if(h)systemStatus.classList.add('ok')}
function params(){const p=new URLSearchParams();if(q.value)p.set('q',q.value);if(category.value)p.set('category',category.value);if(status.value)p.set('status',status.value);return p.toString()}
async function loadAll(){try{notice.className='state';notice.innerText='е§қпҪ…ж№ӘйҚ”зҠәжөҮйҗӯгғЁзҳ‘з’§еӢӘйӘҮ...';const qs=params();files=await fetch('/api/knowledge/files?'+qs,{credentials:'include'}).then(r=>r.json());articles=await fetch('/api/knowledge/articles?'+qs,{credentials:'include'}).then(r=>r.json());assets.sops=await fetch('/api/knowledge/sops?'+qs,{credentials:'include'}).then(r=>r.json());assets.prompts=await fetch('/api/knowledge/prompts?'+qs,{credentials:'include'}).then(r=>r.json());assets.bugs=await fetch('/api/knowledge/bug-cases?'+qs,{credentials:'include'}).then(r=>r.json());assets.courses=await fetch('/api/knowledge/courses?'+qs,{credentials:'include'}).then(r=>r.json());notice.innerText=`е®ёжҸ’е§һжқһ?${files.length} жө еҖҹзҘ«йҸӮж¬ҚпҝҪ?{articles.length} з»Ўеӣ©з…Ўз’Үе—ҳжһғз»”зҮ»;renderMain()}catch(e){notice.className='state error';notice.innerText='йҗӯгғЁзҳ‘з’§еӢӘйӘҮйҚ”зҠәжөҮжҫ¶иҫ«и§Ұ'}}

async function publishSelected(){if(selectedArticle)await publishArticle(selectedArticle.id);else if(lastGenerated)await publishArticle(lastGenerated.article.id)}
async function summarizeFile(id){const data=await fetch(`/api/knowledge/files/${id}/summarize`,{method:'POST',credentials:'include'}).then(r=>r.json());detailTitle.innerText='AIйҺ¬иҚӨзІЁзјҒж’ҙзҒү';detailBody.innerText=JSON.stringify(data.result,null,2);await loadAll();selectFile(id)}
async function classifyFile(id){const data=await fetch(`/api/knowledge/files/${id}/classify`,{method:'POST',credentials:'include'}).then(r=>r.json());detailTitle.innerText='AIйҚ’е—ҷиў«зјҒж’ҙзҒү';detailBody.innerText=JSON.stringify(data.result,null,2);await loadAll();selectFile(id)}
async function generateFile(id){lastGenerated=await fetch(`/api/knowledge/files/${id}/article`,{method:'POST',credentials:'include'}).then(r=>r.json());selectedArticle=lastGenerated.article;pubBtn.disabled=false;detailTitle.innerText='йҗўзҶёеһҡзјҒж’ҙзҒү';detailBody.innerText=JSON.stringify(lastGenerated,null,2);await loadAll()}
async function publishArticle(id){const data=await fetch(`/api/knowledge/articles/${id}/publish`,{method:'POST',credentials:'include'}).then(r=>r.json());detailTitle.innerText='йҚҷжҲқз«·зјҒж’ҙзҒү';detailBody.innerText=JSON.stringify(data.article,null,2);await loadAll()}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
initShell().then(loadAll);
</script>
