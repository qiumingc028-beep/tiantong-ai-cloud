  function accessFor(role){if(role==='owner')return ALL_ACCESS;return Object.prototype.hasOwnProperty.call(ROLE_ACCESS,role)?ROLE_ACCESS[role]:['/jd-dashboard.html']}
  function canOpen(role,href){if(!href||href==='#'||href.startsWith('/api/'))return true;const normalizedHref=href==='/'?'/index.html':href;const access=accessFor(role);return access===ALL_ACCESS||access.includes(normalizedHref)}

  function clearClientAuth(){try{localStorage.removeItem('token');localStorage.removeItem('tiantong_token');localStorage.removeItem('session');localStorage.removeItem('tiantong_session');sessionStorage.clear()}catch(e){}}

<div class="app">
  <aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
  <main class="main">
    <header class="topbar"><strong>AI员工名册中心</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="hero">
        <div><h1>AI员工名册中心</h1><p>管理天统AI公司所有AI员工，统一分配、启用、停用和任务协同。</p></div>
        <button onclick="openEmployeeModal()">新增AI员工</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">AI员工总数</div><div id="statTotal" class="value">-</div></div>
        <div class="stat"><div class="label">启用员工</div><div id="statActive" class="value">-</div></div>
        <div class="stat"><div class="label">停用员工</div><div id="statInactive" class="value">-</div></div>
        <div class="stat"><div class="label">军团数量</div><div id="statLegions" class="value">-</div></div>
        <div class="stat"><div class="label">可接任务类型数量</div><div id="statTaskTypes" class="value">-</div></div>
      </div>
      <section class="card runtime-card">
        <div class="runtime-head">
          <div>
            <h2>AI员工运行状态</h2>

          <div class="stat"><div class="label">工作中数量</div><div id="runtimeWorking" class="value">-</div></div>

<script type="text/plain" data-rbac-protected>
  const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI员工工作台','/employee-workspace.html'],['AI员工能力档案','/employee-capabilities.html'],['多模型路由中心','/model-routing.html'],['AI工具调用权限中心','/tool-permissions.html'],['SOP / Skill 绑定中心','/sop-skill-center.html'],['天赋：Skill / 插件赋能中心','/skill-plugin-center.html'],['AI执行日志中心','/employee-activity-log.html'],['AI任务中心','/task-center.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['系统设置','/settings.html']];
  let employees = [];
  let runtimeStatus = null;
  let selectedEmployee = null;
  let editingCode = null;

  function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/ai-employees.html'?'active':''}" href="${h}">${l}</a>`).join('')}
  function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
  async function logout(){await window.secureLogout()}
  function escapeHtml(text){return String(text??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function fmtTime(value){return value ? value.slice(0,19).replace('T',' ') : '-'}
  function listText(value){return Array.isArray(value) ? value : []}
  function splitList(value){return value.split(',').map(s=>s.trim()).filter(Boolean)}
  function statusLabel(row){return row.is_legacy ? '<span class="badge legacy">legacy 旧占位</span>' : `<span class="badge ${row.status}">${row.status==='active'?'启用':'停用'}</span>`}
  function runtimeLabel(status){const labels={working:'工作中',error:'异常',idle:'空闲',offline:'离线'};return `<span class="runtime-status ${escapeHtml(status)}">${labels[status]||escapeHtml(status||'未知')}</span>`}
  function chips(items){const list=listText(items);return list.length ? list.map(x=>`<span class="badge">${escapeHtml(x)}</span>`).join('') : '<span class="muted">-</span>'}
  function toolChips(items){const list=listText(items);return list.length ? list.slice(0,5).map(x=>`<span class="badge">${escapeHtml(x.tool_name)} · ${escapeHtml(x.risk_level)}</span>`).join('') : '<span class="muted">暂无</span>'}
  async function api(url, options={}){const res=await fetch(url,{credentials:'include',...options});if(!res.ok){const data=await res.json().catch(()=>({}));throw new Error(data.detail||`${res.status} ${res.statusText}`)}return res.json()}

  async function init(){
    renderMenu();tick();setInterval(tick,1000);
    const user=await api('/api/me');me.innerText=`${user.display_name} · ${user.role_label||user.role}`;
    const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';if(h)systemStatus.classList.add('ok');
    await loadEmployees();
    await loadRuntimeStatus();
  }

  async function loadRuntimeStatus(){
    try{
      runtimeState.className='state';runtimeState.innerText='正在加载AI员工运行状态...';
      runtimeStatus=await api('/api/ai-employees/runtime-status');
      renderRuntimeStatus();
    }catch(e){
      runtimeState.className='state error';runtimeState.innerText=`AI员工运行状态加载失败：${e.message}`;runtimeRows.innerHTML='<tr><td colspan="6">加载失败，请刷新重试。</td></tr>';
    }
  }

  function renderRuntimeStatus(){
    const summary=runtimeStatus&&runtimeStatus.summary?runtimeStatus.summary:{};
    const rows=runtimeStatus&&Array.isArray(runtimeStatus.employees)?runtimeStatus.employees:[];
    runtimeTotal.innerText=summary.total_employees??0;
    runtimeOnline.innerText=summary.online_count??0;
    runtimeWorking.innerText=summary.working_count??0;
    runtimeError.innerText=summary.error_count??0;
    runtimeState.className=rows.length?'state':'state empty';
    runtimeState.innerText=rows.length?`运行状态已更新：${fmtTime(runtimeStatus.checked_at)}。`:'暂无AI员工运行状态。';
    runtimeRows.innerHTML=rows.length?rows.map(row=>`<tr>
      <td><strong>${escapeHtml(row.employee_name)}</strong><div class="code">${escapeHtml(row.employee_code)}</div></td>
      <td>${runtimeLabel(row.runtime_status)}<div class="muted">${escapeHtml(row.status)}</div></td>
      <td>${row.current_task?`<strong>${escapeHtml(row.current_task.title)}</strong><div class="muted">#${escapeHtml(row.current_task.task_id)} · ${escapeHtml(row.current_task.status)}</div>`:'<span class="muted">暂无</span>'}</td>
      <td>${escapeHtml(row.today_completed_tasks??0)}</td>
      <td>${row.recent_error?`<strong>${escapeHtml(row.recent_error.title)}</strong><div class="muted">#${escapeHtml(row.recent_error.task_id)} · ${escapeHtml(row.recent_error.status)}</div>`:'<span class="muted">暂无</span>'}</td>
      <td>${toolChips(row.tools)}</td>
    </tr>`).join(''):'<tr><td colspan="6">暂无AI员工运行状态。</td></tr>';
  }

  async function loadEmployees(){
    try{
      pageState.className='state';pageState.innerText='正在加载AI员工名册...';
      const params=new URLSearchParams();
      if(statusFilter.value) params.set('status',statusFilter.value);
      params.set('include_legacy', legacyFilter.checked ? 'true' : 'false');
      employees=await api(`/api/ai-employees?${params.toString()}`);
      updateLegionFilter();
      renderEmployees();
    }catch(e){
      pageState.className='state error';pageState.innerText=`AI员工名册加载失败：${e.message}`;employeeRows.innerHTML='<tr><td colspan="8">加载失败，请刷新重试。</td></tr>';
    }
  }

  function updateLegionFilter(){
    const current=legionFilter.value;
    const legions=[...new Set(employees.map(e=>e.legion).filter(Boolean))].sort();
    legionFilter.innerHTML='<option value="">全部军团</option>'+legions.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
    if(legions.includes(current)) legionFilter.value=current;
  }

  function updateStats(rows){
    const all=employees;
    statTotal.innerText=all.length;
    statActive.innerText=all.filter(e=>e.status==='active').length;
    statInactive.innerText=all.filter(e=>e.status==='inactive').length;
    statLegions.innerText=new Set(all.map(e=>e.legion).filter(Boolean)).size;
    statTaskTypes.innerText=new Set(all.flatMap(e=>listText(e.task_types))).size;
    pageState.className=rows.length?'state':'state empty';
    pageState.innerText=rows.length?`已显示 ${rows.length} / ${all.length} 个AI员工。`:'暂无AI员工，请初始化天统AI员工名册。';
  }

  function renderEmployees(){
    const q=search.value.trim().toLowerCase();
    const legion=legionFilter.value;
    const rows=employees.filter(e=>(!legion||e.legion===legion)&&(!q||[e.employee_code,e.employee_name,e.legion,e.duty,listText(e.task_types).join(' '),listText(e.default_permissions).join(' ')].join(' ').toLowerCase().includes(q)));
    updateStats(rows);
    employeeRows.innerHTML=rows.length?rows.map(e=>`<tr>
      <td><span class="code">${escapeHtml(e.employee_code)}</span></td>
      <td><a href="/ai-employee-detail.html?code=${encodeURIComponent(e.employee_code)}"><strong>${escapeHtml(e.employee_name)}</strong></a></td>
      <td>${escapeHtml(e.legion||'-')}</td>
      <td class="muted">${escapeHtml(e.duty||'-')}</td>
      <td class="chips">${chips(e.task_types)}</td>
      <td class="chips">${chips(e.default_permissions)}</td>
      <td>${statusLabel(e)}</td>
      <td><div class="actions"><a class="button-link" href="/ai-employee-detail.html?code=${encodeURIComponent(e.employee_code)}">详情</a><button class="secondary" onclick="selectEmployee('${escapeHtml(e.employee_code)}')">查看</button><button class="secondary" onclick="openEmployeeModal('${escapeHtml(e.employee_code)}')">编辑</button><button class="${e.status==='active'?'warn':'good'}" onclick="toggleEmployee('${escapeHtml(e.employee_code)}','${e.status}')">${e.status==='active'?'停用':'启用'}</button></div></td>
    </tr>`).join(''):'<tr><td colspan="8">暂无AI员工，请初始化天统AI员工名册。</td></tr>';
    if(selectedEmployee){const fresh=employees.find(e=>e.employee_code===selectedEmployee.employee_code);if(fresh) renderDetail(fresh)}
  }

  async function selectEmployee(code){
    try{const employee=await api(`/api/ai-employees/${encodeURIComponent(code)}`);selectedEmployee=employee;renderDetail(employee)}
    catch(e){alert(`员工详情加载失败：${e.message}`)}
  }

  function renderDetail(e){
    detailPanel.innerHTML=`<h2>${escapeHtml(e.employee_name)}</h2><div class="muted code">${escapeHtml(e.employee_code)}</div>
      <div class="detail-row"><div class="detail-label">所属军团</div><div>${escapeHtml(e.legion||'-')}</div></div>
      <div class="detail-row"><div class="detail-label">职责说明</div><div class="muted">${escapeHtml(e.duty||'-')}</div></div>
      <div class="detail-row"><div class="detail-label">可接任务类型</div><div>${chips(e.task_types)}</div></div>
      <div class="detail-row"><div class="detail-label">默认权限</div><div>${chips(e.default_permissions)}</div></div>
      <div class="detail-row"><div class="detail-label">当前状态</div><div>${statusLabel(e)}</div></div>
      <div class="detail-row"><div class="detail-label">最近更新时间</div><div>${fmtTime(e.updated_at)}</div></div>
      <div class="actions"><button class="secondary" onclick="openEmployeeModal('${escapeHtml(e.employee_code)}')">编辑</button><button class="${e.status==='active'?'warn':'good'}" onclick="toggleEmployee('${escapeHtml(e.employee_code)}','${e.status}')">${e.status==='active'?'停用':'启用'}</button></div>`;
  }

  function openEmployeeModal(code){
    editingCode=code||null;
    const e=editingCode?employees.find(item=>item.employee_code===editingCode):null;
    modalTitle.innerText=e?'编辑AI员工':'新增AI员工';
    formCode.value=e?e.employee_code:'';formCode.disabled=!!e;
    formName.value=e?e.employee_name:'';formLegion.value=e?(e.legion||''):'';
    formDuty.value=e?(e.duty||''):'';formStatus.value=e?(e.status||'active'):'active';
    formTaskTypes.value=e?listText(e.task_types).join(', '):'';
    formPermissions.value=e?listText(e.default_permissions).join(', '):'';
    formSort.value=e?(e.sort_order||0):0;formLegacy.checked=!!(e&&e.is_legacy);
    employeeModal.classList.add('open');
  }
  function closeEmployeeModal(){employeeModal.classList.remove('open')}

  async function saveEmployee(){
    try{
      const body={employee_name:formName.value.trim(),legion:formLegion.value.trim()||null,duty:formDuty.value.trim()||null,status:formStatus.value,task_types:splitList(formTaskTypes.value),default_permissions:splitList(formPermissions.value),is_legacy:formLegacy.checked,sort_order:Number(formSort.value||0)};
      if(!body.employee_name){alert('请填写员工名称');return}
      if(editingCode){
        await api(`/api/ai-employees/${encodeURIComponent(editingCode)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      }else{
        body.employee_code=formCode.value.trim();
        if(!body.employee_code){alert('请填写员工编号');return}
        await api('/api/ai-employees',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      }
      closeEmployeeModal();await loadEmployees();await loadRuntimeStatus();if(editingCode) await selectEmployee(editingCode);
    }catch(e){alert(`保存失败：${e.message}`)}
  }

  async function toggleEmployee(code,status){
    try{await api(`/api/ai-employees/${encodeURIComponent(code)}/${status==='active'?'disable':'enable'}`,{method:'POST'});await loadEmployees();await loadRuntimeStatus();await selectEmployee(code)}
    catch(e){alert(`${status==='active'?'停用':'启用'}失败：${e.message}`)}
  }

  init().catch(e=>{pageState.className='state error';pageState.innerText=`页面加载失败：${e.message}`});
</script>
</body>
</html>
