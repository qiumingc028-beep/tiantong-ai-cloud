<!doctype html>
<html lang="zh-CN" data-required-menu="menu.workflows">
<head><style>html{visibility:hidden}</style><script src="/rbac-navigation.js"></script>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI工作流中心 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#111827;--good:#15803d}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.menu a.disabled{opacity:.5}.main{min-width:0}.topbar{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.ok{color:var(--good)}.content{padding:24px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}.sub{color:var(--muted)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}input,select{height:38px;border:1px solid #cbd5e1;border-radius:8px;padding:0 10px;background:white}button{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:820px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#f8fafc;color:#475569}.tag{padding:4px 9px;border-radius:999px;background:#e2e8f0;font-size:12px}.state{border:1px solid var(--line);background:white;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:12px}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}@media(max-width:760px){.app{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}
  .auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}</style>
</head>
<body class="auth-pending">
<script type="text/plain" data-rbac-protected>
(function(){
  if (window.__tiantongFrontSecurity) return;
  window.__tiantongFrontSecurity = true;
  const ALL_ACCESS = null;
  const ROLE_ACCESS = {
    owner: ALL_ACCESS,
    boss: ALL_ACCESS,
    admin: [
      '/index.html',
      '/control.html',
      '/stores.html',
      '/jd-dashboard.html',
      '/jd-integrations.html',
      '/employee-workspace.html',
      '/employee-capabilities.html',
      '/model-routing.html',
      '/tool-permissions.html',
      '/sop-skill-center.html',
      '/skill-plugin-center.html',
      '/employee-activity-log.html',
      '/task-center.html',
      '/metrics.html',
      '/import.html',
      '/ai-employees.html',
      '/workflows.html',
      '/account-center.html',
      '/template-center.html',
      '/brands.html',
      '/store-groups.html',
      '/ai-assets.html',
      '/settings.html',
    ],
    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    designer: ['/ai-assets.html','/workflows.html'],
    editor: ['/ai-assets.html','/workflows.html'],
    finance: ['/jd-dashboard.html','/metrics.html','/import.html']
  };
  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};
  const rawFetch = window.fetch.bind(window);
  let currentUser = null;
  let redirecting = false;

  function normalizeRole(user){
    const raw = String((user && (user.role_code || user.role)) || '').trim();
    return ROLE_ALIASES[raw] || raw || 'guest';
  }
  function accessFor(role){
    if (role === 'owner') return ALL_ACCESS;
    return Object.prototype.hasOwnProperty.call(ROLE_ACCESS, role) ? ROLE_ACCESS[role] : ['/jd-dashboard.html'];
  }
  function canOpen(role, href){
    if (!href || href === '#' || href.startsWith('/api/')) return true;
    const normalizedHref = href === '/' ? '/index.html' : href;
    const access = accessFor(role);
    return access === ALL_ACCESS || access.includes(normalizedHref);
  }
  function firstAllowed(role){
    const access = accessFor(role);
    return access === ALL_ACCESS ? '/index.html' : (access[0] || '/login.html');
  }
  function currentPath(){
    return location.pathname === '/' ? '/index.html' : location.pathname;
  }
  function clearClientAuth(){
    try { localStorage.removeItem('token'); localStorage.removeItem('tiantong_token'); localStorage.removeItem('session'); localStorage.removeItem('tiantong_session'); sessionStorage.clear(); } catch(e) {}
  }
  function friendlyText(status, detail){
    if (status === 401) return detail || '????????????';
    if (status === 403) return detail || '??????????????????';
    return detail || '???????????';
  }
  function safeRedirect(url){
    if (redirecting) return;
    redirecting = true;
    setTimeout(function(){ location.href = url; }, 450);
  }
  function applyRoleUI(user){
    currentUser = user || currentUser;
    const role = normalizeRole(currentUser);
    document.querySelectorAll('.menu a, .quick a').forEach(function(link){
      const href = link.getAttribute('href') || '';
      const allowed = canOpen(role, href);
      link.style.display = allowed ? '' : 'none';
      link.setAttribute('aria-hidden', allowed ? 'false' : 'true');
    });
    const path = currentPath();
    if (path !== '/login.html' && !canOpen(role, path)) {
      alert('???????????????????????????');
      safeRedirect(firstAllowed(role));
      return;
    }
    document.body.classList.remove('auth-pending');
  }
  async function verifyLogin(){
    try {
      const res = await rawFetch('/api/me', {credentials:'include'});
      if (res.status === 401) {
        clearClientAuth();
        safeRedirect('/login.html');
        return;
      }
      if (!res.ok) throw new Error('????????');
      const user = await res.json();
      applyRoleUI(user);
    } catch(e) {
      document.body.classList.remove('auth-pending');
      const box = document.getElementById('notice') || document.getElementById('pageState') || document.getElementById('state');
      if (box) { box.className = 'state error'; box.innerText = '??????????????????'; }
    }
  }
  window.fetch = async function(input, init){
    const res = await rawFetch(input, init);
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.includes('/api/me') && res.ok) {
      res.clone().json().then(applyRoleUI).catch(function(){});
    }
    if (url.includes('/api/') && res.status === 401) {
      clearClientAuth();
      alert('????????????');
      safeRedirect('/login.html');
    }
    if (url.includes('/api/') && res.status === 403) {
      res.clone().json().then(function(data){ alert(friendlyText(403, data.detail)); }).catch(function(){ alert(friendlyText(403)); });
      clearClientAuth();
      safeRedirect('/login.html');
    }
    return res;
  };
  window.secureLogout = async function(){
    clearClientAuth();
    try { await rawFetch('/api/logout', {method:'POST', credentials:'include'}); } catch(e) {}
    location.href = '/login.html';
  };
  const keepLogoutSafe = setInterval(function(){ window.logout = window.secureLogout; }, 50);
  setTimeout(function(){ clearInterval(keepLogoutSafe); window.logout = window.secureLogout; }, 3000);
  document.addEventListener('DOMContentLoaded', function(){ if (currentUser) applyRoleUI(currentUser); });
  new MutationObserver(function(){ if (currentUser) applyRoleUI(currentUser); }).observe(document.body, {childList:true, subtree:true});
  verifyLogin();
})();
</script>
<div class="app"><aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside><main class="main">
    <header class="topbar"><strong>AI工作流中心</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="card"><h1>AI工作流中心</h1><div class="sub">围绕AI员工任务的自动化工作流视图</div></div>
      <div class="toolbar"><input id="search" placeholder="搜索AI员工/任务/负责人" oninput="renderRows()"><select id="statusFilter" onchange="renderRows()"><option value="">全部状态</option><option value="idle">空闲</option><option value="running">执行中</option><option value="paused">暂停</option><option value="error">异常</option></select><button class="secondary" onclick="load()">刷新表格</button></div>
      <div id="pageState" class="state">正在加载AI工作流...</div>
      <div class="table-wrap"><table><thead><tr><th>AI员工</th><th>状态</th><th>今日任务</th><th>负责人</th><th>最后执行时间</th></tr></thead><tbody id="rows"></tbody></table></div>
    </section></main></div>
  <script type="text/plain" data-rbac-protected>
    const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工中心','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏：知识资产中心','/knowledge-center.html'],['系统设置','/settings.html']];let taskRows=[];
    function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/workflows.html'?'active ':''}${h.startsWith('#')?'disabled':''}" href="${h}" ${h.startsWith('#')?'onclick="return disabledEntry()"':''}>${l}</a>`).join('')}function disabledEntry(){alert('账号资料中心入口已预留，等待后端页面路由开放。');return false}function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}async function logout(){await fetch('/api/logout',{method:'POST',credentials:'include'});location.href='/login.html'}async function api(url,opt={}){const r=await fetch(url,{credentials:'include',...opt});if(r.status===401){location.href='/login.html';return}if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||'请求失败')}return r.json()}async function init(){renderMenu();tick();setInterval(tick,1000);const user=await api('/api/me');me.innerText=`${user.display_name} · ${user.role_label||user.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';if(h)systemStatus.classList.add('ok')}
    function statusName(s){return {idle:'空闲',running:'执行中',paused:'暂停',error:'异常'}[s]||s}
    async function load(){try{pageState.className='state';pageState.innerText='正在加载AI工作流...';taskRows=await api('/api/ai/tasks');renderRows()}catch(e){pageState.className='state error';pageState.innerText=e.message||'AI工作流加载失败';rows.innerHTML='<tr><td colspan="5">加载失败，请刷新重试</td></tr>'}}
    function renderRows(){const q=search.value.trim().toLowerCase(),sf=statusFilter.value;const list=taskRows.filter(t=>(!sf||t.status===sf)&&(!q||[t.ai_employee_name,t.today_task,t.owner&&t.owner.display_name].join(' ').toLowerCase().includes(q)));pageState.innerText=list.length?`已显示 ${list.length} / ${taskRows.length} 个AI工作流。`:'暂无符合条件的AI工作流。接口开发中 / 等待后端AI任务服务完成。';rows.innerHTML=list.length?list.map(t=>`<tr><td>${t.ai_employee_name}</td><td><span class="tag">${statusName(t.status)}</span></td><td>${t.today_task||'-'}</td><td>${t.owner?t.owner.display_name:'未分配'}</td><td>${t.last_run_at?t.last_run_at.slice(0,19).replace('T',' '):'未执行'}</td></tr>`).join(''):'<tr><td colspan="5">暂无AI工作流任务</td></tr>'}
    init().then(load).catch(e=>{pageState.className='state error';pageState.innerText=e.message||'页面加载失败'});
  </script>
</body>
</html>
