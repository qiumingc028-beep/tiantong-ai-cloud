<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI员工工作台 Employee Workspace - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#101827;--good:#15803d;--warn:#b45309;--bad:#b91c1c;--blue:#0369a1;--teal:#0f766e}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px minmax(0,1fr)}.side{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;padding:15px 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.top{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:12px}.meta,.toolbar,.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px;color:var(--muted);font-size:13px}.content{padding:24px}.hero{background:linear-gradient(135deg,#0f172a,#0f766e 58%,#0369a1);color:white;border-radius:8px;padding:24px;margin-bottom:16px;display:flex;justify-content:space-between;gap:16px;align-items:flex-end}.hero h1{margin:0;font-size:28px}.hero p{color:#d1fae5;line-height:1.6;margin:8px 0 0}.hero .note{border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#e0f2fe;border-radius:8px;padding:10px 12px;max-width:360px}.stats{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:12px;margin-bottom:16px}.stat{background:white;border:1px solid var(--line);border-radius:8px;padding:14px}.stat .label{color:var(--muted);font-size:12px}.stat .value{font-size:24px;font-weight:800;margin-top:8px}.layout{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:16px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.head h2{font-size:18px;margin:0}.state{border:1px solid var(--line);background:white;border-radius:8px;padding:12px;color:var(--muted);margin-bottom:12px}.state.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.state.empty{border-style:dashed;text-align:center;padding:26px}.employee-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.employee-card{border:1px solid var(--line);background:#fff;border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s}.employee-card:hover,.employee-card.selected{border-color:#0f766e;box-shadow:0 8px 22px rgba(15,23,42,.08)}.employee-card.blocked{border-color:#fecaca;background:#fff7f7}.employee-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.employee-title h3{margin:0;font-size:17px}.code{font-family:Consolas,monospace;color:#0f766e}.muted{color:var(--muted);line-height:1.65}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:#e2e8f0;color:#475569;white-space:nowrap}.badge.standby{background:#e0f2fe;color:#075985}.badge.running{background:#fef3c7;color:#92400e}.badge.reviewing,.badge.auditing{background:#ede9fe;color:#5b21b6}.badge.deploying{background:#ccfbf1;color:#115e59}.badge.completed{background:#dcfce7;color:#166534}.badge.blocked{background:#fee2e2;color:#991b1b}.badge.pending_boss{background:#ffedd5;color:#9a3412}.badge.yes{background:#ffedd5;color:#9a3412}.badge.no{background:#f1f5f9;color:#475569}.progress{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:#0f766e}.progress.blocked span{background:#b91c1c}.kv{display:grid;grid-template-columns:140px 1fr;gap:7px 10px;font-size:14px}.kv div:nth-child(odd){color:var(--muted)}.detail-row{border-top:1px solid var(--line);padding:12px 0}.detail-row:first-of-type{border-top:0}.list-item{border:1px solid var(--line);background:#f8fafc;border-radius:8px;padding:10px;margin-top:8px}.risk-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.toolbar input,.toolbar select{height:38px;border:1px solid #cbd5e1;border-radius:8px;background:white;font-family:inherit;padding:0 10px}.toolbar input{width:260px}button,.btn{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer;text-decoration:none;display:inline-flex;font-family:inherit}button.secondary,.btn.secondary{background:white;color:var(--ink);border:1px solid var(--line)}@media(max-width:1240px){.stats{grid-template-columns:repeat(3,1fr)}.layout{grid-template-columns:1fr}.employee-grid{grid-template-columns:1fr}}@media(max-width:760px){.app{grid-template-columns:1fr}.top,.hero{align-items:flex-start;flex-direction:column}.content{padding:18px}.stats,.risk-grid{grid-template-columns:1fr}.toolbar input{width:100%}.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
  <main>
    <header class="top"><strong>AI员工工作台 Employee Workspace</strong><div class="meta"><span id="time" class="pill"></span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="hero">
        <div><h1>AI员工工作台 Employee Workspace</h1><p>查看所有 AI 员工的运行状态、当前任务、进度、卡点、验收、审计、部署和最近动作。</p></div>
        <div class="note">只读展示；不派单、不开始任务、不部署、不提交代码。</div>
      </div>
      <div id="pageState" class="state">正在加载 AI员工工作台...</div>
      <section class="stats" id="summaryStats"></section>
      <div class="layout">
        <section>
          <div class="card">
            <div class="toolbar">
              <input id="searchInput" placeholder="搜索员工名称 / code / 部门 / 任务" oninput="renderEmployees()">
              <select id="statusFilter" onchange="renderEmployees()"><option value="">全部状态</option></select>
              <button class="secondary" onclick="loadWorkspace()">刷新</button>
              <a class="btn secondary" href="/task-center.html">任务中心</a>
              <a class="btn secondary" href="/orchestrator.html">Orchestrator</a>
            </div>
          </div>
          <div id="employeeGrid" class="employee-grid"></div>
        </section>
        <aside>
          <div id="detailPanel" class="card">
            <h2>员工详情</h2>
            <div class="muted">点击员工卡片查看详情。</div>
          </div>
        </aside>
      </div>
      <section class="risk-grid">
        <div class="card"><div class="head"><h2>卡住员工</h2></div><div id="blockerList"></div></div>
        <div class="card"><div class="head"><h2>等待天检验收</h2></div><div id="reviewList"></div></div>
        <div class="card"><div class="head"><h2>等待天监审计</h2></div><div id="auditList"></div></div>
        <div class="card"><div class="head"><h2>等待天盾部署</h2></div><div id="deployList"></div></div>
      </section>
      <div class="card"><div class="head"><h2>最近动作</h2></div><div id="actionList"></div></div>
    </section>
  </main>
</div>
<script>
const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI员工工作台','/employee-workspace.html'],['AI员工能力档案','/employee-capabilities.html'],['AI执行日志中心','/employee-activity-log.html'],['AI执行追溯中心','/employee-activity-trace.html'],['AI任务中心','/task-center.html'],['AI自动派单中心','/orchestrator.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['天盾部署中心','/deploy-center.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['系统设置','/settings.html']];
const statusLabels={standby:'待命',running:'执行中',reviewing:'验收中',auditing:'审计中',deploying:'部署中',completed:'已完成',blocked:'卡住',pending_boss:'等待老板确认'};
let workspace={summary:{},employees:[],blockers:[],pending_reviews:[],pending_audits:[],pending_deploys:[],recent_actions:[]};
let selectedCode='';

function renderMenu(){menu.innerHTML=menus.map(([label,href])=>`<a class="${href==='/employee-workspace.html'?'active':''}" href="${href}">${esc(label)}</a>`).join('')}
function tick(){time.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
async function logout(){try{await fetch('/api/logout',{method:'POST',credentials:'include'})}catch(e){}location.href='/login.html'}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function text(value,emptyText='暂无'){if(value===true)return '是';if(value===false)return '否';if(typeof value==='number')return String(value);if(typeof value==='string'&&value.trim())return value;return emptyText}
function arr(value){return Array.isArray(value)?value:[]}
function obj(value){return value&&typeof value==='object'&&!Array.isArray(value)?value:{}}
function fmt(value){return value?String(value).slice(0,19).replace('T',' '):'暂无'}
function num(value){return Number.isFinite(Number(value))?Number(value):0}
function statusText(status){return statusLabels[status]||text(status)}
function statusBadge(status){const s=text(status,'standby');return `<span class="badge ${esc(s)}">${esc(statusText(s))}</span>`}
function boolBadge(value){return `<span class="badge ${value?'yes':'no'}">${value?'是':'否'}</span>`}
function progressBar(value,status){const safe=Math.max(0,Math.min(100,num(value)));return `<div class="progress ${status==='blocked'?'blocked':''}"><span style="width:${safe}%"></span></div><div class="muted">${safe}%</div>`}
function sourceSummary(source,emptyText='暂无 Orchestrator 来源'){
  if(typeof source==='string'&&source.trim())return source;
  const s=obj(source);if(!Object.keys(s).length)return emptyText;
  return [
    s.analysis_record_id||s.analysis_id,
    s.detected_sprint,
    s.detected_stage,
    s.completion_status,
    s.recommended_codex
  ].map(v=>text(v,'')).filter(Boolean).join(' · ')||emptyText;
}
function commitSummary(commit,emptyText='暂无 GitHub Commit'){
  if(typeof commit==='string'&&commit.trim())return commit;
  const c=obj(commit);if(!Object.keys(c).length)return emptyText;
  return [
    c.commit_id||c.commit_hash,
    c.message,
    c.created_at
  ].map(v=>text(v,'')).filter(Boolean).join(' · ')||emptyText;
}

async function api(url){
  let res;
  try{res=await fetch(url,{credentials:'include'})}catch(e){throw new Error('网络异常，请稍后重试')}
  if(res.status===401){location.href='/login.html';throw new Error('请先登录')}
  const data=res.ok?null:await res.json().catch(()=>({}));
  if(res.status===403)throw new Error((data&&data.detail)||'无权限访问 AI员工工作台');
  if(res.status>=500)throw new Error((data&&data.detail)||'系统异常，请稍后重试');
  if(!res.ok)throw new Error((data&&data.detail)||'请求失败，请稍后重试');
  return res.json();
}

async function init(){
  renderMenu();tick();setInterval(tick,1000);renderStatusOptions();renderEmpty();
  try{const user=await api('/api/me');me.innerText=`${text(user.display_name||user.username,'当前用户')} · ${text(user.role_label||user.role)}`}catch(e){pageState.className='state error';pageState.innerText=e.message;return}
  await loadWorkspace();
}

function renderStatusOptions(){statusFilter.innerHTML='<option value="">全部状态</option>'+Object.keys(statusLabels).map(k=>`<option value="${esc(k)}">${esc(statusLabels[k])}</option>`).join('')}

async function loadWorkspace(){
  pageState.className='state';pageState.innerText='正在加载 AI员工工作台...';
  try{
    const data=await api('/api/employee-workspace/overview');
    workspace={
      summary:obj(data.summary),
      employees:arr(data.employees),
      blockers:arr(data.blockers),
      pending_reviews:arr(data.pending_reviews),
      pending_audits:arr(data.pending_audits),
      pending_deploys:arr(data.pending_deploys),
      recent_actions:arr(data.recent_actions)
    };
    pageState.className='state ok';pageState.innerText='AI员工工作台已更新。';
    renderAll();
  }catch(e){
    pageState.className='state error';pageState.innerText=e.message||'AI员工工作台加载失败';
    renderEmpty();
  }
}

function renderAll(){renderSummary();renderEmployees();renderLists();if(selectedCode){const row=workspace.employees.find(e=>e.employee_code===selectedCode);if(row)renderDetail(row)}}
function renderEmpty(){workspace={summary:{},employees:[],blockers:[],pending_reviews:[],pending_audits:[],pending_deploys:[],recent_actions:[]};renderSummary();renderEmployees();renderLists()}

function renderSummary(){
  const s=workspace.summary||{};
  const items=[['AI员工总数','total_employees'],['待命','standby_count'],['执行中','running_count'],['验收中','reviewing_count'],['已完成','completed_count'],['卡住','blocked_count'],['当前 Sprint','current_sprint'],['今日任务数','today_tasks'],['等待老板确认','pending_boss_confirmations'],['等待天检验收','pending_test_reviews'],['等待天监审计','pending_audits'],['等待天盾部署','pending_deploys']];
  summaryStats.innerHTML=items.map(([label,key])=>`<div class="stat"><div class="label">${esc(label)}</div><div class="value">${esc(key==='current_sprint'?text(s[key],'暂无'):num(s[key]))}</div></div>`).join('');
}

function renderEmployees(){
  const q=searchInput.value.trim().toLowerCase(),status=statusFilter.value;
  const rows=workspace.employees.filter(e=>(!status||e.status===status)&&(!q||[e.employee_name,e.employee_code,e.department,e.role,e.current_task,e.next_suggestion].map(x=>text(x,'')).join(' ').toLowerCase().includes(q)));
  if(!rows.length){employeeGrid.innerHTML='<div class="state empty">暂无 AI 员工状态数据</div>';detailPanel.innerHTML='<h2>员工详情</h2><div class="muted">暂无可查看的员工。</div>';return}
  employeeGrid.innerHTML=rows.map(e=>employeeCard(e)).join('');
  if(!selectedCode||!rows.some(e=>e.employee_code===selectedCode)){selectedCode=rows[0].employee_code;renderDetail(rows[0])}
}

function employeeCard(e){
  const blocked=!!e.has_blocker,selected=e.employee_code===selectedCode;
  return `<article class="employee-card ${blocked?'blocked':''} ${selected?'selected':''}" onclick="selectEmployee('${esc(e.employee_code)}')">
    <div class="employee-title"><div><h3>${esc(text(e.employee_name))}</h3><div class="code">${esc(text(e.employee_code))}</div></div>${statusBadge(e.status)}</div>
    <div class="muted">${esc(text(e.department))} · ${esc(text(e.role))}</div>
    <div class="detail-row"><strong>${esc(text(e.current_task))}</strong><div class="muted">task_id：${esc(text(e.task_id))} · ${esc(text(e.sprint))} · ${esc(text(e.stage))}</div>${progressBar(e.progress_percent,e.status)}</div>
    <div class="kv"><div>最近动作</div><div>${esc(text(e.last_action))}</div><div>更新时间</div><div>${esc(fmt(e.last_updated_at))}</div><div>阻塞</div><div>${boolBadge(!!e.has_blocker)} ${esc(text(e.blocker_reason,''))}</div><div>老板确认</div><div>${boolBadge(!!e.needs_boss_confirmation)}</div><div>下一步</div><div>${esc(text(e.next_suggestion))}</div><div>验收状态</div><div>${esc(text(e.review_status,'暂无验收状态'))}</div><div>审计状态</div><div>${esc(text(e.audit_status,'暂无审计状态'))}</div><div>部署状态</div><div>${esc(text(e.deploy_status,'暂无部署状态'))}</div><div>最近 Orchestrator 来源</div><div>${esc(sourceSummary(e.recent_orchestrator_source))}</div><div>最近 GitHub Commit</div><div>${esc(commitSummary(e.recent_git_commit))}</div></div>
  </article>`;
}

function selectEmployee(code){selectedCode=code;const row=workspace.employees.find(e=>e.employee_code===code);renderEmployees();if(row)renderDetail(row)}

function renderDetail(e){
  detailPanel.innerHTML=`<div class="head"><h2>${esc(text(e.employee_name))}</h2>${statusBadge(e.status)}</div><div class="code">${esc(text(e.employee_code))}</div>
    <div class="detail-row"><div class="kv"><div>当前任务</div><div>${esc(text(e.current_task))}</div><div>task_id</div><div>${esc(text(e.task_id))}</div><div>Sprint</div><div>${esc(text(e.sprint))}</div><div>阶段</div><div>${esc(text(e.stage))}</div><div>最近动作</div><div>${esc(text(e.last_action))}</div><div>最近更新时间</div><div>${esc(fmt(e.last_updated_at))}</div><div>阻塞原因</div><div>${esc(text(e.blocker_reason))}</div><div>下一步建议</div><div>${esc(text(e.next_suggestion))}</div><div>验收状态</div><div>${esc(text(e.review_status,'暂无验收状态'))}</div><div>审计状态</div><div>${esc(text(e.audit_status,'暂无审计状态'))}</div><div>部署状态</div><div>${esc(text(e.deploy_status,'暂无部署状态'))}</div><div>最近 Orchestrator 来源</div><div>${esc(sourceSummary(e.recent_orchestrator_source))}</div><div>最近 GitHub Commit</div><div>${esc(commitSummary(e.recent_git_commit))}</div></div></div>
    <div class="detail-row"><strong>最近 Orchestrator 来源</strong>${renderSource(e.recent_orchestrator_source)}</div>
    <div class="detail-row"><strong>最近 GitHub commit</strong>${renderCommit(e.recent_git_commit)}</div>`;
}

function renderSource(source){
  if(typeof source==='string'&&source.trim())return `<div class="muted">${esc(source)}</div>`;
  const s=obj(source);if(!Object.keys(s).length)return '<div class="muted">暂无</div>';
  const flags=arr(s.safety_flags).length?arr(s.safety_flags).map(esc).join('、'):'暂无';
  return `<div class="kv"><div>analysis_record_id</div><div>${esc(text(s.analysis_record_id||s.analysis_id))}</div><div>识别员工</div><div>${esc(text(s.detected_employee_name))}</div><div>Sprint</div><div>${esc(text(s.detected_sprint))}</div><div>阶段</div><div>${esc(text(s.detected_stage))}</div><div>完成状态</div><div>${esc(text(s.completion_status))}</div><div>推荐对象</div><div>${esc(text(s.recommended_codex))}</div><div>推荐动作</div><div>${esc(text(s.recommended_action))}</div><div>阻塞</div><div>${boolBadge(!!s.has_blocker)}</div><div>需要修复</div><div>${boolBadge(!!s.needs_fix)}</div><div>安全标记</div><div>${flags}</div><div>创建时间</div><div>${esc(fmt(s.created_at))}</div></div>`;
}

function renderCommit(commit){
  if(typeof commit==='string'&&commit.trim())return `<div class="muted">${esc(commit)}</div>`;
  const c=obj(commit);if(!Object.keys(c).length)return '<div class="muted">暂无</div>';
  return `<div class="kv"><div>commit_id</div><div class="code">${esc(text(c.commit_id||c.commit_hash))}</div><div>message</div><div>${esc(text(c.message))}</div><div>branch</div><div>${esc(text(c.branch))}</div><div>时间</div><div>${esc(fmt(c.created_at))}</div></div>`;
}

function renderLists(){
  renderList(blockerList,workspace.blockers,'暂无卡住员工',item=>`${text(item.employee_name)} · task_id ${text(item.task_id)} · ${text(item.reason)}`);
  renderList(reviewList,workspace.pending_reviews,'暂无待验收任务',item=>`${text(item.title)} · task_id ${text(item.task_id)} · ${text(item.employee_name||item.employee_code)}`);
  renderList(auditList,workspace.pending_audits,'暂无待审计任务',item=>`${text(item.title)} · task_id ${text(item.task_id)} · ${text(item.employee_name||item.employee_code)}`);
  renderList(deployList,workspace.pending_deploys,'暂无待部署任务',item=>`${text(item.title)} · ${text(item.environment)} · ${text(item.status)}`);
  renderList(actionList,workspace.recent_actions,'暂无最近动作',item=>`${text(item.title)} · ${text(item.type)} · task_id ${text(item.task_id)} · ${fmt(item.at)}`);
}

function renderList(el,items,emptyText,formatter){
  const rows=arr(items);el.innerHTML=rows.length?rows.map(item=>`<div class="list-item">${esc(formatter(obj(item)))}</div>`).join(''):`<div class="muted">${esc(emptyText)}</div>`;
}

init();
</script>
</body>
</html>
