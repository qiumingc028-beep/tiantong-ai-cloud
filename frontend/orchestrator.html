<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI自动派单中心 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#101827;--brand:#0f766e;--brand2:#0ea5e9;--good:#15803d;--warn:#b45309;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px minmax(0,1fr)}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:#fff}.main{min-width:0}.topbar{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}button,.btn{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}button.secondary,.btn.secondary{background:white;color:var(--ink);border:1px solid var(--line)}button:disabled{background:#94a3b8;cursor:not-allowed}.content{padding:24px}.hero{background:linear-gradient(135deg,#0f172a 0%,#0f766e 58%,#0ea5e9 100%);color:white;border-radius:8px;padding:24px;margin-bottom:16px;display:flex;justify-content:space-between;gap:18px;align-items:flex-end}.hero h1{font-size:28px;margin:0}.hero p{margin:8px 0 0;color:#d1fae5;line-height:1.6}.hero-note{border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;color:#e0f2fe;font-size:13px;white-space:nowrap}.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(360px,.9fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.section-head h2{font-size:18px;margin:0}.muted{color:var(--muted);line-height:1.7}.state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:12px}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.state.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.field label{font-size:13px;color:#475569;font-weight:700}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:inherit;background:white;color:var(--ink)}textarea{min-height:190px;resize:vertical;line-height:1.6}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;gap:10px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;background:#e2e8f0;color:#475569}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}.badge.bad{background:#fee2e2;color:#991b1b}.badge.info{background:#dbeafe;color:#1d4ed8}.kv{display:grid;grid-template-columns:150px minmax(0,1fr);gap:9px 12px;font-size:14px}.kv div:nth-child(odd){color:var(--muted)}.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);background:#f8fafc;border-radius:8px;padding:12px}.mono{font-family:Consolas,monospace}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:white}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;text-align:left;vertical-align:top}th{background:#f8fafc;color:#475569}@media(max-width:1000px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.hero{align-items:flex-start;flex-direction:column}.hero-note{white-space:normal}.row{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
  <main class="main">
    <header class="topbar"><strong>AI自动派单中心</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="hero"><div><h1>AI自动派单中心</h1><p>粘贴 Codex 回复，系统分析下一步并生成 Prompt 草稿；老板确认后自行复制给对应 Codex。</p></div><div class="hero-note">只分析、不发送、不执行、不部署</div></div>
      <div id="pageState" class="state">正在加载自动派单中心...</div>
      <section class="grid">
        <div>
          <div class="card">
            <div class="section-head"><h2>回复分析</h2><button id="analyzeBtn" onclick="analyzeReply()">分析回复</button></div>
            <div class="row"><div class="field"><label>Sprint</label><input id="sprintInput" value="Sprint 5"></div><div class="field"><label>当前任务</label><input id="taskInput" value="AI Orchestrator MVP"></div></div>
            <div class="field"><label>Codex 回复内容</label><textarea id="replyText" placeholder="粘贴天颜、天王、天检等 Codex 回复。系统只做分析和 Prompt 草稿生成。"></textarea></div>
          </div>
          <div class="card" style="margin-top:16px"><div class="section-head"><h2>Prompt 草稿</h2><div class="actions"><button class="secondary" onclick="confirmPrompt()">记录确认</button><button onclick="copyPrompt()">复制 Prompt</button></div></div><div id="nextInfo" class="state">暂无分析结果。</div><textarea id="promptDraft" placeholder="分析完成后显示下一步 Prompt 草稿，可人工调整后复制。"></textarea><p class="muted">安全边界：本页不会连接 Codex，不会发送消息，不会执行命令；只记录老板确认和复制动作。</p></div>
        </div>
        <div>
          <div class="card"><div class="section-head"><h2>分析结果</h2><span id="confidenceBadge" class="badge">未分析</span></div><div id="analysisKv" class="kv"></div><div id="blockerBox" class="state" style="margin-top:12px">暂无阻断问题。</div></div>
          <div class="card" style="margin-top:16px"><div class="section-head"><h2>当前 Sprint 链路</h2><button class="secondary" onclick="loadSprint()">刷新</button></div><div id="sprintFlow" class="list"></div></div>
        </div>
      </section>
      <div class="card" style="margin-top:16px"><div class="section-head"><h2>最近分析记录</h2><button class="secondary" onclick="loadRecords()">刷新</button></div><div class="table-wrap"><table><thead><tr><th>时间</th><th>AI员工</th><th>Sprint</th><th>阶段</th><th>状态</th><th>推荐下一步</th><th>置信度</th></tr></thead><tbody id="recordRows"><tr><td colspan="7" class="muted">暂无记录</td></tr></tbody></table></div></div>
    </section>
  </main>
</div>
<script>
  const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI任务中心','/task-center.html'],['AI自动派单中心','/orchestrator.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['天盾部署中心','/deploy-center.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['系统设置','/settings.html']];
  const roleAccess={owner:null,boss:null,admin:null};
  let currentAnalysis=null;
  function roleOf(user){const raw=String((user&&(user.role_code||user.role))||'').trim();return ({boss:'owner',owner:'owner',administrator:'admin'}[raw]||raw||'guest')}
  function clearAuth(){try{localStorage.removeItem('token');localStorage.removeItem('tiantong_token');localStorage.removeItem('session');localStorage.removeItem('tiantong_session');sessionStorage.clear()}catch(e){}}
  function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/orchestrator.html'?'active':''}" href="${h}">${l}</a>`).join('')}
  function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
  function escapeHtml(text){return String(text??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function fmt(value){return value?String(value).slice(0,19).replace('T',' '):'暂无'}
  function badgeClass(value){const v=String(value||'').toLowerCase();if(['completed','accepted','confirmed','done','healthy'].includes(v))return 'ok';if(['blocked','rejected','failed','critical'].includes(v))return 'bad';if(['needs_fix','manual_review','warning'].includes(v))return 'warn';return 'info'}
  function badge(value){const v=value||'unknown';return `<span class="badge ${badgeClass(v)}">${escapeHtml(v)}</span>`}
  function setState(text,type=''){pageState.className='state '+type;pageState.innerText=text}
  async function api(url,options={}){let res;try{res=await fetch(url,{credentials:'include',...options})}catch(e){throw new Error('网络异常，请稍后重试。')}if(res.status===401){clearAuth();location.href='/login.html';throw new Error('未登录或登录过期。')}if(res.status===403){throw new Error('当前账号无权访问 AI自动派单中心。')}if(!res.ok){const data=await res.json().catch(()=>({}));throw new Error(data.detail||'系统异常，请稍后重试。')}return res.json()}
  async function logout(){clearAuth();try{await fetch('/api/logout',{method:'POST',credentials:'include'})}catch(e){}location.href='/login.html'}
  async function init(){tick();setInterval(tick,1000);renderMenu();try{const user=await api('/api/me');const role=roleOf(user);if(!['owner','admin'].includes(role)){setState('无权限访问 AI自动派单中心。请使用 boss / owner / admin 账号访问。','error');return}me.innerText=`${user.display_name||user.username||'当前用户'} · ${user.role_label||user.role||role}`;setState('自动派单中心已就绪。','ok');await Promise.all([loadSprint(),loadRecords()])}catch(e){setState(e.message,'error')}}
  async function analyzeReply(){const text=replyText.value.trim();if(!text){setState('请先粘贴 Codex 回复内容。','warn');return}analyzeBtn.disabled=true;setState('正在分析回复...');try{const data=await api('/api/orchestrator/analyze-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reply_text:text,context:{sprint:sprintInput.value.trim()||'Sprint 5',current_task:taskInput.value.trim()||'AI Orchestrator MVP'}})});currentAnalysis=data;renderAnalysis(data);promptDraft.value=data.prompt_draft||'';setState('分析完成，请老板人工确认后复制 Prompt。','ok');await loadRecords()}catch(e){setState(e.message,'error')}finally{analyzeBtn.disabled=false}}
  function renderAnalysis(data){const emp=data.detected_employee||{}, next=data.recommended_next||{};confidenceBadge.className='badge '+badgeClass(data.manual_review_required?'manual_review':'completed');confidenceBadge.innerText=`置信度 ${Math.round((Number(data.confidence)||0)*100)}%`;analysisKv.innerHTML=[['识别员工',escapeHtml(emp.employee_name||'暂无')],['员工编号',`<span class="mono">${escapeHtml(emp.employee_code||'暂无')}</span>`],['Sprint',escapeHtml(data.detected_sprint||'暂无')],['阶段',escapeHtml(data.detected_stage||'暂无')],['完成状态',badge(data.completion_status)],['需要修复',data.needs_fix?'是':'否'],['推荐对象',escapeHtml(next.target_name||next.target_codex||'暂无')],['推荐动作',escapeHtml(next.action||'暂无')],['需要人工复核',data.manual_review_required?'是':'否']].map(([k,v])=>`<div>${k}</div><div>${v}</div>`).join('');const flags=(data.safety_flags||[]).map(escapeHtml).join('、');const blockers=(data.blockers||[]).map(escapeHtml).join('；');blockerBox.className='state '+(data.has_blocker?'error':(flags?'warn':''));blockerBox.innerText=data.has_blocker?`发现阻断，不能进入下一阶段。${blockers}`:(flags?`已检测安全标记：${flags}`:'暂无阻断问题。');nextInfo.className='state '+(data.manual_review_required?'warn':'');nextInfo.innerText='这是系统推荐，不是执行动作；老板确认后自行复制发送给对应 Codex。'}
  async function confirmPrompt(){if(!currentAnalysis){setState('请先完成回复分析。','warn');return}const prompt=promptDraft.value.trim();if(!prompt){setState('Prompt 草稿为空，不能记录确认。','warn');return}try{await api('/api/orchestrator/confirm-next-prompt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis_id:currentAnalysis.analysis_id,target_codex:(currentAnalysis.recommended_next||{}).target_codex||'tiantong',confirmed_prompt:prompt,confirm_status:'confirmed'})});setState('已记录老板确认；请手动复制 Prompt 后自行发送。','ok');await loadRecords()}catch(e){setState(e.message,'error')}}
  async function copyPrompt(){const prompt=promptDraft.value.trim();if(!prompt){setState('Prompt 草稿为空，无法复制。','warn');return}try{await navigator.clipboard.writeText(prompt);setState('已复制，请老板自行粘贴发送给对应 Codex。','ok')}catch(e){promptDraft.select();document.execCommand('copy');setState('已复制，请老板自行粘贴发送给对应 Codex。','ok')}}
  async function loadSprint(){try{const data=await api('/api/orchestrator/sprints/current');const rows=data.chain||[];sprintFlow.innerHTML=rows.length?rows.map(x=>`<div class="item"><strong>${escapeHtml(x.stage||'阶段')}</strong><div class="muted">${escapeHtml(x.codex||'暂无')} · ${badge(x.status)}</div></div>`).join(''):'<div class="muted">暂无 Sprint 链路。</div>'}catch(e){sprintFlow.innerHTML=`<div class="state error">${escapeHtml(e.message)}</div>`}}
  async function loadRecords(){try{const rows=await api('/api/orchestrator/analysis-records?limit=20');recordRows.innerHTML=rows.length?rows.map(r=>`<tr><td>${fmt(r.created_at)}</td><td>${escapeHtml(r.detected_employee_name||'暂无')}</td><td>${escapeHtml(r.detected_sprint||'暂无')}</td><td>${escapeHtml(r.detected_stage||'暂无')}</td><td>${badge(r.completion_status)}</td><td>${escapeHtml(r.recommended_codex||'暂无')}</td><td>${Math.round((Number(r.confidence)||0)*100)}%</td></tr>`).join(''):'<tr><td colspan="7" class="muted">暂无分析记录</td></tr>'}catch(e){recordRows.innerHTML=`<tr><td colspan="7" class="muted">${escapeHtml(e.message)}</td></tr>`}}
  init();
</script>
</body>
</html>
