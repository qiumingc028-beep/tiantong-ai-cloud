<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知识资产详情 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--brand:#0f766e;--good:#15803d;--warn:#b45309;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px minmax(0,1fr)}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:#fff}.main{min-width:0}.topbar{height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 24px;gap:16px}.top-title{font-weight:700}.top-meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.content{padding:24px}.panel{background:white;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}.label{color:var(--muted);font-size:13px}.value{font-size:20px;font-weight:700;margin-top:6px}.button-row{display:flex;gap:8px;flex-wrap:wrap}.button{border:0;background:#111827;color:#fff;border-radius:8px;padding:9px 12px;cursor:pointer}.button.secondary{background:#fff;color:#111827;border:1px solid var(--line)}.button.good{background:var(--brand)}.button.warn{background:var(--warn)}.button.bad{background:var(--bad)}.row{display:flex;gap:10px;flex-wrap:wrap}.row > *{flex:1}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.toolbar input,.toolbar select,.toolbar textarea{border:1px solid var(--line);border-radius:8px;padding:10px;background:white;min-width:160px}.toolbar textarea{min-height:86px}.state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:14px;white-space:pre-wrap;line-height:1.6}.state.ok{border-color:#bbf7d0;background:#f0fdf4;color:var(--good)}.state.error{border-color:#fecaca;background:#fef2f2;color:var(--bad)}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.table{width:100%;border-collapse:collapse;background:white;min-width:820px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{background:#f8fafc;color:#475569;font-weight:700}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;background:#f8fafc}.badge.published{color:var(--good);border-color:#bbf7d0;background:#f0fdf4}.badge.review{color:var(--warn);border-color:#fde68a;background:#fffbeb}.badge.archive{color:#6b7280}.detail pre{white-space:pre-wrap;word-break:break-word;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;line-height:1.6;max-height:420px;overflow:auto}.mini-list{display:grid;gap:10px}.mini-item{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.mini-item strong{display:block;margin-bottom:6px}.mini-item p{margin:0;color:#475569;white-space:pre-wrap;line-height:1.55}.auth-pending .sidebar,.auth-pending .main{visibility:hidden}@media(max-width:1100px){.app{grid-template-columns:1fr}.grid,.row{grid-template-columns:1fr}.content,.topbar{padding:18px;height:auto;align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body class="auth-pending">
<script>
(function(){
  const rawFetch=window.fetch.bind(window);let redirecting=false,currentUser=null,assetId=new URLSearchParams(location.search).get('id')||'';
  const ALL_ACCESS=null;const ROLE_ACCESS={owner:ALL_ACCESS,boss:ALL_ACCESS,admin:['/index.html','/control.html','/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/ai-employees.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/knowledge-asset-center.html','/knowledge-asset-detail.html','/settings.html'],operation:['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/knowledge-asset-center.html','/knowledge-asset-detail.html'],operator:['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/knowledge-asset-center.html','/knowledge-asset-detail.html']};
  function safeRedirect(url){if(redirecting)return;redirecting=true;setTimeout(()=>location.href=url,200)}
  function normalizeRole(user){return String((user&&(user.role_code||user.role))||'').trim().toLowerCase()}
  function canOpen(role,href){const access=role==='owner'?ALL_ACCESS:(Object.prototype.hasOwnProperty.call(ROLE_ACCESS,role)?ROLE_ACCESS[role]:['/jd-dashboard.html']);return access===ALL_ACCESS||access.includes(href)}
  function applyRole(user){currentUser=user||currentUser;const role=normalizeRole(currentUser);document.querySelectorAll('.menu a').forEach(a=>{const ok=canOpen(role,a.getAttribute('href')||'');a.style.display=ok?'':'none'});if(!canOpen(role,location.pathname)){safeRedirect('/index.html');return}document.body.classList.remove('auth-pending')}
  window.fetch=async function(input,init){const res=await rawFetch(input,init);const url=typeof input==='string'?input:(input&&input.url)||'';if(url.includes('/api/')&&res.status===401)safeRedirect('/login.html');if(url.includes('/api/')&&res.status===403){notice('没有访问权限','error');safeRedirect('/login.html')}return res};
  window.secureLogout=async function(){try{await rawFetch('/api/logout',{method:'POST',credentials:'include'})}catch(e){}location.href='/login.html'};
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function notice(text, kind='ok'){const node=document.getElementById('notice');node.className=`state ${kind}`;node.textContent=text}
  function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
  function renderMenu(){menu.innerHTML=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工中心','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏知识资产中心','/knowledge-asset-center.html'],['系统设置','/settings.html']].map(([l,h])=>`<a class="${h==='/knowledge-asset-detail.html'?'active':''}" href="${h}">${l}</a>`).join('')}
  function statusBadge(status){const cls=status==='已发布'?'published':(status==='待审核'||status==='审核中'?'review':(status==='已归档'?'archive':''));return `<span class="badge ${cls}">${esc(status||'草稿')}</span>`}
  async function init(){renderMenu();tick();setInterval(tick,1000);const me=await rawFetch('/api/me',{credentials:'include'});if(me.ok){const u=await me.json();userInfo.innerText=`${u.display_name} · ${u.role_label||u.role}`;applyRole(u)}await load()}
  async function load(){if(!assetId||assetId==='new'){notice('请在中心页选择一个知识资产查看详情','warn');return}try{notice('正在加载知识资产详情...');const asset=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}`,{credentials:'include'}).then(r=>r.json());const versions=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}/versions`,{credentials:'include'}).then(r=>r.json());const sources=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}/sources`,{credentials:'include'}).then(r=>r.json());const citations=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}/citations`,{credentials:'include'}).then(r=>r.json());window.asset=asset.knowledge;window.versionList=versions.items||[];window.sourceData=sources;window.citationData=citations;render(asset.knowledge,window.versionList,sources,citations);notice(`已加载知识资产：${asset.knowledge.title}`,'ok')}catch(err){notice(`加载失败：${err.message||err}`,'error')}}
  function render(asset, versions, sources, citations){document.getElementById('headline').innerText=asset.title;document.getElementById('summary').innerText=asset.summary||'暂无摘要';document.getElementById('meta').innerHTML=`${statusBadge(asset.status)} <span class="badge">${esc(asset.knowledge_type||'')}</span> <span class="badge">${esc(asset.category||'')}</span> <span class="badge">${esc(asset.risk_level||'')}</span> <span class="badge">${esc(asset.visibility||'')}</span>`;document.getElementById('counts').innerHTML=`<div class="card"><div class="label">来源数量</div><div class="value">${asset.source_count||0}</div></div><div class="card"><div class="label">一手来源</div><div class="value">${asset.primary_source_count||0}</div></div><div class="card"><div class="label">引用记录</div><div class="value">${asset.citation_count||0}</div></div><div class="card"><div class="label">版本数量</div><div class="value">${versions.length}</div></div>`;document.getElementById('content').textContent=asset.current_version?asset.current_version.content:'';document.getElementById('versionBody').innerText=versions.map(v=>`# ${v.version_number} ${v.title}\n${v.change_summary || ''}\n${v.content_hash}\n${v.created_at || ''}`).join('\n\n---\n\n')||'暂无版本';document.getElementById('sourcesBody').innerText=((sources.items||[]).map(s=>`${s.source_kind} | ${s.source_title} | ${s.source_url || s.redacted_url || ''}`).join('\n')||'暂无来源');document.getElementById('citationBody').innerText=((citations.items||[]).map(c=>`${c.usage_type} | ${c.citation_summary}`).join('\n')||'暂无引用');document.getElementById('reviewBody').innerText=(asset.reviews||[]).map(r=>`${r.review_stage} | ${r.review_status} | ${r.reviewer_name} | ${r.review_comment}`).join('\n\n')||'暂无审核记录';document.getElementById('sourceLinksBody').innerText=(asset.sources||[]).map(s=>`${s.source_kind} | ${s.source_title} | ${s.source_url || s.note || ''}`).join('\n\n')||'暂无来源链接';}
  window.doAction=async function(action){if(!window.asset)return;const base={reviewer_employee_code:document.getElementById('actor').value.trim()||'tiancang',review_comment:document.getElementById('comment').value.trim(),boss_confirmed:document.getElementById('bossConfirmed').checked,sensitive_check_passed:document.getElementById('sensitiveOk').checked};const routes={submit:'/submit-review',approve:'/approve',reject:'/reject',publish:'/publish',archive:'/archive'};const res=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}${routes[action]}`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(base)});const data=await res.json();if(!res.ok)throw new Error(data.detail||'操作失败');notice(`操作成功：${action}`,'ok');await load();}
  window.createVersion=async function(){const content=document.getElementById('newVersionContent').value.trim();if(!content){notice('请输入新版本内容','warn');return}const payload={title:document.getElementById('newVersionTitle').value.trim()||window.asset.title,summary:document.getElementById('newVersionSummary').value.trim()||window.asset.summary,content,change_summary:document.getElementById('newVersionChange').value.trim()||'创建新版本',change_reason:'手动创建新版本',source_type:'manual',source_execution_id:null,source_report_id:null,created_by:'tiancang'};const res=await rawFetch(`/api/v2/knowledge/${encodeURIComponent(assetId)}/versions`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(payload)});const data=await res.json();if(!res.ok)throw new Error(data.detail||'创建失败');notice('已创建新版本','ok');await load()}
  init();
})();
</script>
<div class="app">
  <aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
  <main class="main">
    <header class="topbar">
      <div class="top-title">知识资产详情</div>
      <div class="top-meta"><span id="currentTime" class="pill">--:--:--</span><span id="userInfo" class="pill">加载中</span><button class="button" onclick="secureLogout()">退出</button></div>
    </header>
    <section class="content">
      <div class="page-head">
        <div>
          <h1 id="headline">知识资产详情</h1>
          <div id="summary" class="sub">正在加载...</div>
        </div>
        <div class="button-row"><button class="secondary button" onclick="location.href='/knowledge-asset-center.html'">返回列表</button><button class="good button" onclick="doAction('submit')">提交审核</button><button class="button" onclick="doAction('approve')">批准</button><button class="warn button" onclick="doAction('reject')">驳回</button><button class="good button" onclick="doAction('publish')">发布</button><button class="secondary button" onclick="doAction('archive')">归档</button></div>
      </div>
      <div id="notice" class="state">正在加载知识资产详情...</div>
      <div id="meta" class="row" style="margin-bottom:16px"></div>
      <div id="counts" class="grid"></div>
      <div class="layout" style="display:grid;grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);gap:16px">
        <section class="panel">
          <div class="toolbar"><strong>当前版本正文</strong></div>
          <pre id="content">加载中...</pre>
          <div class="toolbar"><strong>创建新版本</strong></div>
          <div class="row"><input id="newVersionTitle" placeholder="新版本标题"><input id="newVersionSummary" placeholder="新版本摘要"></div>
          <textarea id="newVersionContent" placeholder="新版本正文"></textarea>
          <input id="newVersionChange" placeholder="版本说明">
          <div class="button-row" style="margin-top:10px"><button class="button good" onclick="createVersion()">创建新版本</button></div>
        </section>
        <aside>
          <section class="panel"><strong>版本历史</strong><pre id="versionBody">加载中...</pre></section>
          <section class="panel"><strong>来源与证据</strong><pre id="sourcesBody">加载中...</pre><pre id="sourceLinksBody">加载中...</pre></section>
          <section class="panel"><strong>引用记录</strong><pre id="citationBody">加载中...</pre></section>
          <section class="panel"><strong>审核记录</strong><div class="row"><input id="actor" value="tiancang" placeholder="审核员工编号"><input id="comment" placeholder="审核意见"></div><div class="row"><label style="display:flex;align-items:center;gap:6px"><input id="bossConfirmed" type="checkbox">老板确认</label><label style="display:flex;align-items:center;gap:6px"><input id="sensitiveOk" type="checkbox" checked>敏感检查通过</label></div><pre id="reviewBody">加载中...</pre></section>
        </aside>
      </div>
    </section>
  </main>
</div>
</body>
</html>
