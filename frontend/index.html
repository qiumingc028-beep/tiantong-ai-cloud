<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>老板驾驶舱 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--brand:#0f766e;--dark:#111827;--good:#15803d;--warn:#b45309;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px minmax(0,1fr)}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:#fff}.menu a.disabled{opacity:.5;cursor:not-allowed}.main{min-width:0}.topbar{height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 24px;gap:16px}.top-title{font-weight:700}.top-meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.ok{color:var(--good)}button{border:0;background:var(--dark);color:#fff;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.content{padding:24px}.page-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin-bottom:16px}h1{font-size:26px;margin:0}.sub{color:var(--muted);margin-top:6px}.grid{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:17px;min-height:118px}.card.primary{background:var(--brand);border-color:var(--brand);color:white}.label{color:var(--muted);font-size:13px}.primary .label,.primary .hint{color:#d1fae5}.num{font-size:28px;font-weight:800;margin-top:14px}.money{color:var(--brand)}.primary .money{color:white}.hint{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.5}.state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:16px}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:18px 0 12px}.quick{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px}.quick a{background:white;border:1px solid var(--line);border-radius:8px;text-decoration:none;color:var(--ink);padding:14px;min-height:86px}.quick strong{display:block;margin-bottom:8px}.quick span{color:var(--muted);font-size:12px;line-height:1.5}.quick a.disabled{opacity:.55;cursor:not-allowed}@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}.quick{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.app{grid-template-columns:1fr}.topbar,.page-head{align-items:flex-start;flex-direction:column;height:auto;padding:14px 18px}.content{padding:18px}.grid,.quick{grid-template-columns:1fr}}
    .auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}
  </style>
</head>
<body class="auth-pending">
<script>
(function(){
  if (window.__tiantongFrontSecurity) return;
  window.__tiantongFrontSecurity = true;
  const ALL_ACCESS = null;
  const ROLE_ACCESS = {
    owner: ALL_ACCESS,
    boss: ALL_ACCESS,
    admin: ['/index.html','/control.html','/stores.html','/jd-dashboard.html','/jd-integrations.html','/task-center.html','/metrics.html','/import.html','/ai-employees.html','/deploy-center.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/ai-assets.html','/settings.html'],
    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    designer: ['/ai-assets.html','/workflows.html'],
    editor: ['/ai-assets.html','/workflows.html'],
    finance: ['/jd-dashboard.html','/metrics.html','/import.html']
  };
  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};
  const rawFetch = window.fetch.bind(window);
  let currentUser = null;
  let redirecting = false;
  function normalizeRole(user){const raw = String((user && (user.role_code || user.role)) || '').trim();return ROLE_ALIASES[raw] || raw || 'guest'}
  function accessFor(role){if (role === 'owner') return ALL_ACCESS;return Object.prototype.hasOwnProperty.call(ROLE_ACCESS, role) ? ROLE_ACCESS[role] : ['/jd-dashboard.html']}
  function canOpen(role, href){if (!href || href === '#' || href.startsWith('/api/')) return true;const normalizedHref = href === '/' ? '/index.html' : href;const access = accessFor(role);return access === ALL_ACCESS || access.includes(normalizedHref)}
  function firstAllowed(role){const access = accessFor(role);return access === ALL_ACCESS ? '/index.html' : (access[0] || '/login.html')}
  function currentPath(){return location.pathname === '/' ? '/index.html' : location.pathname}
  function clearClientAuth(){try { localStorage.removeItem('token'); localStorage.removeItem('tiantong_token'); localStorage.removeItem('session'); localStorage.removeItem('tiantong_session'); sessionStorage.clear(); } catch(e) {}}
  function friendlyText(status, detail){if (status === 401) return detail || '登录已失效，请重新登录。';if (status === 403) return detail || '当前账号没有访问该页面或接口的权限。';return detail || '请求失败，请稍后重试。'}
  function safeRedirect(url){if (redirecting) return;redirecting = true;setTimeout(function(){ location.href = url; }, 450)}
  function applyRoleUI(user){currentUser = user || currentUser;const role = normalizeRole(currentUser);document.querySelectorAll('.menu a, .quick a').forEach(function(link){const href = link.getAttribute('href') || '';const allowed = canOpen(role, href);link.style.display = allowed ? '' : 'none';link.setAttribute('aria-hidden', allowed ? 'false' : 'true')});const path = currentPath();if (path !== '/login.html' && !canOpen(role, path)) {alert('当前账号没有访问该页面的权限，已为你跳转到可用工作台。');safeRedirect(firstAllowed(role));return}document.body.classList.remove('auth-pending')}
  async function verifyLogin(){try {const res = await rawFetch('/api/me', {credentials:'include'});if (res.status === 401) {clearClientAuth();safeRedirect('/login.html');return}if (!res.ok) throw new Error('登录状态检查失败');const user = await res.json();applyRoleUI(user)} catch(e) {document.body.classList.remove('auth-pending');const box = document.getElementById('notice') || document.getElementById('pageState') || document.getElementById('state');if (box) { box.className = 'state error'; box.innerText = '登录状态检查失败，请刷新或重新登录。'; }}}
  window.fetch = async function(input, init){const res = await rawFetch(input, init);const url = typeof input === 'string' ? input : (input && input.url) || '';if (url.includes('/api/me') && res.ok) {res.clone().json().then(applyRoleUI).catch(function(){})}if (url.includes('/api/') && res.status === 401) {clearClientAuth();alert('登录已失效，请重新登录。');safeRedirect('/login.html')}if (url.includes('/api/') && res.status === 403) {res.clone().json().then(function(data){ alert(friendlyText(403, data.detail)); }).catch(function(){ alert(friendlyText(403)); });clearClientAuth();safeRedirect('/login.html')}return res};
  window.secureLogout = async function(){clearClientAuth();try { await rawFetch('/api/logout', {method:'POST', credentials:'include'}); } catch(e) {}location.href = '/login.html'};
  const keepLogoutSafe = setInterval(function(){ window.logout = window.secureLogout; }, 50);setTimeout(function(){ clearInterval(keepLogoutSafe); window.logout = window.secureLogout; }, 3000);
  document.addEventListener('DOMContentLoaded', function(){ if (currentUser) applyRoleUI(currentUser); });
  new MutationObserver(function(){ if (currentUser) applyRoleUI(currentUser); }).observe(document.body, {childList:true, subtree:true});
  verifyLogin();
})();
</script>
<div class="app">
  <aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
  <main class="main">
    <header class="topbar"><div class="top-title">老板驾驶舱</div><div class="top-meta"><span id="currentTime" class="pill">--:--:--</span><span id="systemStatus" class="pill">系统检查中</span><span id="userInfo" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="page-head"><div><h1>老板驾驶舱</h1><div class="sub">今天60个京东店铺成交、利润、广告、订单和售后风险总览</div></div><button class="secondary" onclick="loadDashboard()">刷新数据</button></div>
      <div id="notice" class="state">正在加载经营数据...</div>
      <div class="grid">
        <div class="card primary"><div class="label">今日成交</div><div class="num money" id="today_sales">-</div><div class="hint">今日GMV合计</div></div>
        <div class="card primary"><div class="label">今日利润</div><div class="num money" id="today_profit">-</div><div class="hint">已接入数据利润合计</div></div>
        <div class="card"><div class="label">广告花费</div><div class="num money" id="ad_spend">-</div><div class="hint">京准通/录入广告费</div></div>
        <div class="card"><div class="label">ROI</div><div class="num" id="roi">-</div><div class="hint">成交 / 广告花费</div></div>
        <div class="card"><div class="label">订单数</div><div class="num" id="orders">-</div><div class="hint">今日支付订单</div></div>
        <div class="card"><div class="label">访客数</div><div class="num" id="visitors">-</div><div class="hint">今日店铺访客</div></div>
        <div class="card"><div class="label">退款数</div><div class="num" id="refunds">-</div><div class="hint">退款风险</div></div>
        <div class="card"><div class="label">售后数</div><div class="num" id="after_sales">-</div><div class="hint">售后工单</div></div>
        <div class="card"><div class="label">店铺数</div><div class="num" id="stores">-</div><div class="hint">启用京东店铺</div></div>
        <div class="card"><div class="label">AI员工在线数</div><div class="num" id="ai_employees_online">-</div><div class="hint">当前在线会话</div></div>
      </div>
      <div class="toolbar"><h2>工作台入口</h2></div>
      <div id="quickLinks" class="quick"></div>
    </section>
  </main>
</div>
<script>
  const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI任务中心','/task-center.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['天盾部署中心','/deploy-center.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏：知识资产中心','/knowledge-center.html'],['系统设置','/settings.html']];
  const quickDesc={'/control.html':'员工账号和角色权限','/stores.html':'60店档案和负责人','/jd-dashboard.html':'60店今日数据和异常','/metrics.html':'手动录入真实数据','/import.html':'Excel/CSV批量导入','/jd-integrations.html':'京东接入状态','/ai-assets.html':'素材接口预留','/workflows.html':'AI工作流状态','/ai-employees.html':'AI员工任务管理','/deploy-center.html':'部署状态和健康检查','/account-center.html':'账号资料与安全','/template-center.html':'Excel字段模板','/brands.html':'品牌资料维护','/store-groups.html':'60店分组管理','/task-center.html':'AI任务调度'};
  let currentUser=null;
  function renderMenu(active='/'){document.getElementById('menu').innerHTML=menus.map(([label,href])=>`<a class="${href===active?'active ':''}${href.startsWith('#')?'disabled':''}" href="${href}" ${href.startsWith('#')?'onclick="return disabledEntry()"':''}>${label}</a>`).join('')}
  function disabledEntry(){alert('账号资料中心入口已预留，等待后端页面路由开放。');return false}
  function tick(){document.getElementById('currentTime').innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
  async function initShell(active='/'){renderMenu(active);tick();setInterval(tick,1000);try{const me=await fetch('/api/me',{credentials:'include'});if(!me.ok){location.href='/login.html';return null}currentUser=await me.json();document.getElementById('userInfo').innerText=`${currentUser.display_name} · ${currentUser.role_label||currentUser.role}`;const h=await fetch('/api/health').then(r=>r.json());document.getElementById('systemStatus').innerText=`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`;document.getElementById('systemStatus').classList.add('ok');return currentUser}catch(e){document.getElementById('systemStatus').innerText='系统状态获取失败';return null}}
  function money(v){return '￥'+Number(v||0).toLocaleString('zh-CN',{maximumFractionDigits:2})}
  async function logout(){await fetch('/api/logout',{method:'POST',credentials:'include'});location.href='/login.html'}
  function renderQuick(){const links=['/control.html','/stores.html','/jd-dashboard.html','/metrics.html','/import.html','/jd-integrations.html','/ai-assets.html','/workflows.html','/ai-employees.html','/deploy-center.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/task-center.html'];document.getElementById('quickLinks').innerHTML=links.map(h=>{const label=h==='/account-center.html'?'账号资料中心':(menus.find(m=>m[1]===h)||['京东数据接入'])[0];return `<a class="${h.startsWith('#')?'disabled':''}" href="${h}" ${h.startsWith('#')?'onclick="return disabledEntry()"':''}><strong>${label}</strong><span>${quickDesc[h]||'个人资料和账号安全'}</span></a>`}).join('')}
  async function loadDashboard(){const n=document.getElementById('notice');try{if(!currentUser&&!(await initShell('/index.html')))return;const res=await fetch('/api/owner/dashboard',{credentials:'include'});if(res.status===401){location.href='/login.html';return}if(!res.ok)throw new Error('老板驾驶舱数据加载失败');const d=await res.json();today_sales.innerText=money(d.today_sales);today_profit.innerText=money(d.today_profit);ad_spend.innerText=money(d.ad_spend);roi.innerText=d.roi??0;orders.innerText=d.orders??0;visitors.innerText=d.visitors??0;refunds.innerText=d.refunds??0;after_sales.innerText=d.after_sales??0;stores.innerText=d.stores??0;ai_employees_online.innerText=d.ai_employees_online??0;const empty=Number(d.today_sales||0)===0&&Number(d.orders||0)===0;n.className=empty?'state warn':'state';n.innerText=empty?'今日暂无真实成交/订单数据。接口开发中 / 等待后端采集服务完成，也可以先通过今日数据录入或Excel批量导入写入真实数据。':'数据已刷新：'+new Date().toLocaleTimeString('zh-CN',{hour12:false});renderQuick()}catch(e){n.className='state error';n.innerText=e.message||'数据加载失败，请稍后刷新。'}}
  initShell('/index.html').then(loadDashboard);setInterval(loadDashboard,10000);
</script>
</body>
</html>
