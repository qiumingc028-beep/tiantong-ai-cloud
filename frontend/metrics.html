<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日数据录入 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#111827;--brand:#0f766e;--good:#15803d}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.menu a.disabled{opacity:.5}.main{min-width:0}.topbar{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.ok{color:var(--good)}.content{padding:24px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}h1{margin:0;font-size:26px}.sub,.tip{color:var(--muted);line-height:1.7}.form-row,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}input,select{height:38px;border:1px solid #cbd5e1;border-radius:8px;padding:0 10px;background:white}button{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:920px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#f8fafc;color:#475569}.money{color:var(--brand);font-weight:700}.state{border:1px solid var(--line);background:white;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:12px}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}@media(max-width:760px){.app{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}
  .auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}</style>
</head>
<body class="auth-pending">
<script>
(function(){
  if (window.__tiantongFrontSecurity) return;
  window.__tiantongFrontSecurity = true;
  const ALL_ACCESS = null;
  const ROLE_ACCESS = {
    owner: ALL_ACCESS,
    boss: ALL_ACCESS,
    admin: [
      '/index.html',
      '/control.html',
      '/stores.html',
      '/jd-dashboard.html',
      '/jd-integrations.html',
      '/employee-workspace.html',
      '/employee-capabilities.html',
      '/model-routing.html',
      '/tool-permissions.html',
      '/sop-skill-center.html',
      '/skill-plugin-center.html',
      '/employee-activity-log.html',
      '/task-center.html',
      '/metrics.html',
      '/import.html',
      '/ai-employees.html',
      '/workflows.html',
      '/account-center.html',
      '/template-center.html',
      '/brands.html',
      '/store-groups.html',
      '/ai-assets.html',
      '/settings.html'
    ],
    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    designer: ['/ai-assets.html','/workflows.html'],
    editor: ['/ai-assets.html','/workflows.html'],
    finance: ['/jd-dashboard.html','/metrics.html','/import.html']
  };
  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};
  const rawFetch = window.fetch.bind(window);
  let currentUser = null;
  let redirecting = false;

  function normalizeRole(user){
    const raw = String((user && (user.role_code || user.role)) || '').trim();
    return ROLE_ALIASES[raw] || raw || 'guest';
  }
  function accessFor(role){
    if (role === 'owner') return ALL_ACCESS;
    return Object.prototype.hasOwnProperty.call(ROLE_ACCESS, role) ? ROLE_ACCESS[role] : ['/jd-dashboard.html'];
  }
  function canOpen(role, href){
    if (!href || href === '#' || href.startsWith('/api/')) return true;
    const normalizedHref = href === '/' ? '/index.html' : href;
    const access = accessFor(role);
    return access === ALL_ACCESS || access.includes(normalizedHref);
  }
  function firstAllowed(role){
    const access = accessFor(role);
    return access === ALL_ACCESS ? '/index.html' : (access[0] || '/login.html');
  }
  function currentPath(){
    return location.pathname === '/' ? '/index.html' : location.pathname;
  }
  function clearClientAuth(){
    try { localStorage.removeItem('token'); localStorage.removeItem('tiantong_token'); localStorage.removeItem('session'); localStorage.removeItem('tiantong_session'); sessionStorage.clear(); } catch(e) {}
  }
  function friendlyText(status, detail){
    if (status === 401) return detail || '????????????';
    if (status === 403) return detail || '??????????????????';
    return detail || '???????????';
  }
  function safeRedirect(url){
    if (redirecting) return;
    redirecting = true;
    setTimeout(function(){ location.href = url; }, 450);
  }
  function applyRoleUI(user){
    currentUser = user || currentUser;
    const role = normalizeRole(currentUser);
    document.querySelectorAll('.menu a, .quick a').forEach(function(link){
      const href = link.getAttribute('href') || '';
      const allowed = canOpen(role, href);
      link.style.display = allowed ? '' : 'none';
      link.setAttribute('aria-hidden', allowed ? 'false' : 'true');
    });
    const path = currentPath();
    if (path !== '/login.html' && !canOpen(role, path)) {
      alert('???????????????????????????');
      safeRedirect(firstAllowed(role));
      return;
    }
    document.body.classList.remove('auth-pending');
  }
  async function verifyLogin(){
    try {
      const res = await rawFetch('/api/me', {credentials:'include'});
      if (res.status === 401) {
        clearClientAuth();
        safeRedirect('/login.html');
        return;
      }
      if (!res.ok) throw new Error('????????');
      const user = await res.json();
      applyRoleUI(user);
    } catch(e) {
      document.body.classList.remove('auth-pending');
      const box = document.getElementById('notice') || document.getElementById('pageState') || document.getElementById('state');
      if (box) { box.className = 'state error'; box.innerText = '??????????????????'; }
    }
  }
  window.fetch = async function(input, init){
    const res = await rawFetch(input, init);
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.includes('/api/me') && res.ok) {
      res.clone().json().then(applyRoleUI).catch(function(){});
    }
    if (url.includes('/api/') && res.status === 401) {
      clearClientAuth();
      alert('????????????');
      safeRedirect('/login.html');
    }
    if (url.includes('/api/') && res.status === 403) {
      res.clone().json().then(function(data){ alert(friendlyText(403, data.detail)); }).catch(function(){ alert(friendlyText(403)); });
      clearClientAuth();
      safeRedirect('/login.html');
    }
    return res;
  };
  window.secureLogout = async function(){
    clearClientAuth();
    try { await rawFetch('/api/logout', {method:'POST', credentials:'include'}); } catch(e) {}
    location.href = '/login.html';
  };
  const keepLogoutSafe = setInterval(function(){ window.logout = window.secureLogout; }, 50);
  setTimeout(function(){ clearInterval(keepLogoutSafe); window.logout = window.secureLogout; }, 3000);
  document.addEventListener('DOMContentLoaded', function(){ if (currentUser) applyRoleUI(currentUser); });
  new MutationObserver(function(){ if (currentUser) applyRoleUI(currentUser); }).observe(document.body, {childList:true, subtree:true});
  verifyLogin();
})();
</script>
<div class="app"><aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside><main class="main">
    <header class="topbar"><strong>今日数据录入</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
    <section class="content">
      <div class="card"><h1>今日数据录入中心</h1><p class="sub">接口开发中 / 等待后端采集服务完成前，可在这里录入真实的当天店铺数据。</p></div>
      <div class="card"><h2>录入今日数据</h2><p class="tip">只录入真实数据。保存后老板驾驶舱和京东60店数据中心会同步展示。</p><div class="form-row"><select id="store_id"></select><input id="metric_date" type="date"><input id="sales_amount" type="number" placeholder="今日成交"><input id="profit_amount" type="number" placeholder="今日利润"><input id="ad_spend" type="number" placeholder="广告花费"><input id="roi" type="number" step="0.01" placeholder="ROI"><input id="orders_count" type="number" placeholder="订单数"><input id="visitors_count" type="number" placeholder="访客数"><input id="refunds_count" type="number" placeholder="退款数"><input id="after_sales_count" type="number" placeholder="售后数"><button onclick="saveMetrics()">保存数据</button></div></div>
      <div class="card"><h2>今日店铺数据列表</h2><div class="toolbar"><input id="search" placeholder="搜索店铺编号/名称" oninput="renderMetrics()"><select id="dataFilter" onchange="renderMetrics()"><option value="">全部数据</option><option value="has">有成交或订单</option><option value="empty">暂无成交订单</option></select><button class="secondary" onclick="loadMetrics()">刷新表格</button></div></div>
      <div id="pageState" class="state">正在加载店铺和今日数据...</div>
      <div class="table-wrap"><table><thead><tr><th>店铺</th><th>成交</th><th>利润</th><th>广告费</th><th>ROI</th><th>订单</th><th>访客</th><th>退款</th><th>售后</th></tr></thead><tbody id="metrics"></tbody></table></div>
    </section></main></div>
  <script>
    const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工中心','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏：知识资产中心','/knowledge-center.html'],['系统设置','/settings.html']];let metricRows=[];
    function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/metrics.html'?'active ':''}${h.startsWith('#')?'disabled':''}" href="${h}" ${h.startsWith('#')?'onclick="return disabledEntry()"':''}>${l}</a>`).join('')}function disabledEntry(){alert('账号资料中心入口已预留，等待后端页面路由开放。');return false}function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}async function logout(){await fetch('/api/logout',{method:'POST',credentials:'include'});location.href='/login.html'}async function api(url,opt={}){const r=await fetch(url,{credentials:'include',...opt});if(r.status===401){location.href='/login.html';return}if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||'请求失败')}return r.json()}async function init(){renderMenu();tick();setInterval(tick,1000);metric_date.value=new Date().toISOString().slice(0,10);const user=await api('/api/me');me.innerText=`${user.display_name} · ${user.role_label||user.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';if(h)systemStatus.classList.add('ok')}
    const money=v=>'￥'+Number(v||0).toLocaleString('zh-CN',{maximumFractionDigits:2});
    async function loadStores(){const stores=await api('/api/stores');store_id.innerHTML=stores.length?stores.map(s=>`<option value="${s.id}">${s.store_code}｜${s.store_name}</option>`).join(''):'<option value="">暂无店铺</option>'}
    async function loadMetrics(){try{pageState.className='state';pageState.innerText='正在加载今日数据...';metricRows=await api('/api/metrics/today');renderMetrics()}catch(e){pageState.className='state error';pageState.innerText=e.message||'今日数据加载失败';metrics.innerHTML='<tr><td colspan="9">加载失败，请刷新重试</td></tr>'}}
    function renderMetrics(){const q=search.value.trim().toLowerCase(),df=dataFilter.value;const rows=metricRows.filter(m=>{const has=Number(m.sales_amount||0)>0||Number(m.orders_count||0)>0;return(!df||(df==='has'?has:!has))&&(!q||[m.store_code,m.store_name].join(' ').toLowerCase().includes(q))});const hasAny=metricRows.some(m=>Number(m.sales_amount||0)>0||Number(m.orders_count||0)>0);pageState.className=hasAny?'state':'state warn';pageState.innerText=rows.length?(hasAny?`已显示 ${rows.length} / ${metricRows.length} 家店铺今日数据。`:'今日暂无真实成交/订单数据。接口开发中 / 等待后端采集服务完成，也可以在本页手动录入。'):'暂无符合条件的数据。';metrics.innerHTML=rows.length?rows.map(m=>`<tr><td>${m.store_code}｜${m.store_name}</td><td class="money">${money(m.sales_amount)}</td><td class="money">${money(m.profit_amount)}</td><td>${money(m.ad_spend)}</td><td>${m.roi}</td><td>${m.orders_count}</td><td>${m.visitors_count}</td><td>${m.refunds_count}</td><td>${m.after_sales_count}</td></tr>`).join(''):'<tr><td colspan="9">暂无数据</td></tr>'}
    async function saveMetrics(){try{await api('/api/metrics/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({store_id:Number(store_id.value),metric_date:metric_date.value,sales_amount:Number(sales_amount.value||0),profit_amount:Number(profit_amount.value||0),ad_spend:Number(ad_spend.value||0),roi:Number(roi.value||0),orders_count:Number(orders_count.value||0),visitors_count:Number(visitors_count.value||0),refunds_count:Number(refunds_count.value||0),after_sales_count:Number(after_sales_count.value||0)})});await loadMetrics();alert('数据已保存')}catch(e){alert(e.message)}}
    init().then(loadStores).then(loadMetrics).catch(e=>{pageState.className='state error';pageState.innerText=e.message||'页面加载失败'});
  </script>
</body>
</html>
