<!doctype html>
<html lang="zh-CN" data-required-menu="menu.settings">
<head><style>html{visibility:hidden}</style><script src="/rbac-navigation.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>执行记录 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#101827;--good:#15803d;--warn:#b45309;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
    .app{min-height:100vh;display:grid;grid-template-columns:240px 1fr}
    .side{background:#101827;color:#cbd5e1;padding:18px 14px}
    .brand{font-size:18px;font-weight:700;color:#fff;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    .menu{display:flex;flex-direction:column;gap:6px;margin-top:14px}
    .menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px}
    .menu a.active,.menu a:hover{background:#1f2937;color:#fff}
    .top{min-height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:12px}
    .content{padding:24px}
    .hero{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;border-radius:10px;padding:22px;margin-bottom:16px}
    .hero h1{margin:0;font-size:28px}
    .hero p{margin:8px 0 0;color:#dbeafe;line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .card,.panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}
    .card .label{color:var(--muted);font-size:13px}.card .value{font-size:22px;font-weight:700;margin-top:8px}
    .two{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.8fr);gap:16px}
    .tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{border-radius:999px;padding:4px 9px;background:#e2e8f0;font-size:12px}
    .tag.ok{background:#dcfce7;color:#166534}.tag.warn{background:#fef3c7;color:#92400e}.tag.bad{background:#fee2e2;color:#991b1b}
    .muted{color:var(--muted);line-height:1.65}
    .table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:1180px}
    th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}
    th{background:#f8fafc;color:#475569}
    button,input,select,textarea{font:inherit;border-radius:8px;border:1px solid #cbd5e1;background:#fff}
    button{background:var(--dark);color:#fff;padding:10px 12px;border:0;cursor:pointer}
    button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
    input{height:38px;padding:0 10px}
    .form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
    .detail{display:grid;gap:10px}
    .row{display:grid;grid-template-columns:160px minmax(0,1fr);gap:8px 10px}
    .row div:nth-child(odd){color:var(--muted)}
    pre{white-space:pre-wrap;word-break:break-word;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;max-height:240px;overflow:auto}
    @media(max-width:1200px){.app{grid-template-columns:1fr}.two,.grid,.form,.row{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.content{padding:18px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">天统AI云中台</div>
    <nav class="menu">
      <a href="/agent-runtime.html">Agent Runtime</a>
      <a href="/capability-center.html">能力中心</a>
      <a href="/execution-records.html" class="active">执行记录</a>
      <a href="/research-records.html">研究记录</a>
      <a href="/browser-readonly-test.html">公开网页采集</a>
      <a href="/task-center.html">任务中心</a>
      <a href="/index.html">老板驾驶舱</a>
    </nav>
  </aside>
  <main>
    <header class="top">
      <strong>执行记录</strong>
      <div class="tags"><span id="time" class="tag">--</span><span id="state" class="tag warn">加载中</span></div>
    </header>
    <section class="content">
      <section class="hero">
        <h1>执行记录与审计链路</h1>
        <p>展示任务、员工、能力、状态、审批、结果、重试和审计。所有敏感字段必须脱敏。</p>
      </section>
      <section class="grid">
        <div class="card"><div class="label">执行总数</div><div id="exeTotal" class="value">0</div></div>
        <div class="card"><div class="label">执行成功</div><div id="exeSuccess" class="value">0</div></div>
        <div class="card"><div class="label">等待审批</div><div id="exePending" class="value">0</div></div>
        <div class="card"><div class="label">已超时</div><div id="exeTimeout" class="value">0</div></div>
      </section>
      <section class="two">
        <div class="panel">
          <h2>执行列表</h2>
          <div class="table"><table>
            <thead><tr><th>执行ID</th><th>员工</th><th>能力</th><th>状态</th><th>风险</th><th>审批</th><th>开始</th><th>耗时(ms)</th><th>结果</th><th>操作</th></tr></thead>
            <tbody id="rows"><tr><td colspan="10" class="muted">加载中...</td></tr></tbody>
          </table></div>
        </div>
        <div class="panel">
          <h2>执行详情</h2>
          <div id="detail" class="detail"><div class="muted">请选择一条执行记录查看。</div></div>
          <h2 style="margin-top:18px">审批操作</h2>
          <div class="form">
            <input id="executionId" placeholder="执行ID">
            <input id="cancelReason" placeholder="取消 / 拒绝原因">
            <div class="tags full">
              <button data-rbac-action="execution-records-001">批准并执行</button>
              <button class="secondary" data-rbac-action="execution-records-002">拒绝</button>
              <button class="secondary" data-rbac-action="execution-records-003">取消</button>
              <button class="secondary" data-rbac-action="execution-records-004">刷新</button>
            </div>
          </div>
          <h2 style="margin-top:18px">审计记录</h2>
          <pre id="auditBox">暂无</pre>
        </div>
      </section>
    </section>
  </main>
</div>
<script type="text/plain" data-rbac-protected>
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function tick(){$('time').innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
function tag(text,cls=''){return `<span class="tag ${cls}">${esc(text)}</span>`}
async function api(url,options={}){const res=await fetch(url,{credentials:'include',...options});if(!res.ok){const data=await res.json().catch(()=>({}));throw new Error(data.detail||`${res.status} ${res.statusText}`)}return res.json()}
let executions=[];
async function init(){tick();setInterval(tick,1000);await loadExecutions()}
async function loadExecutions(){
  $('state').className='tag warn';$('state').innerText='加载中';
  try{
    const data=await api('/api/v2/executions');
    executions=data.items||[];
    $('exeTotal').innerText=String(executions.length);
    $('exeSuccess').innerText=String(executions.filter(x=>x.status==='success').length);
    $('exePending').innerText=String(executions.filter(x=>x.status==='waiting_approval').length);
    $('exeTimeout').innerText=String(executions.filter(x=>x.status==='timeout').length);
    $('state').className='tag ok';$('state').innerText='已刷新';
    $('rows').innerHTML=executions.length?executions.map((x,i)=>`<tr>
      <td class="muted mono">${esc(x.execution_id)}</td>
      <td>${esc(x.employee_name||x.employee_code||x.employee_id||'')}</td>
      <td>${esc(x.capability_name||x.capability_id)}</td>
      <td>${tag(x.status_label||x.status,x.status==='success'?'ok':x.status==='failed'||x.status==='timeout'||x.status==='cancelled'?'bad':'warn')}</td>
      <td>${esc(x.risk_level)}</td>
      <td>${tag(x.approval_status_label||x.approval_status,x.approval_status==='approved'?'ok':x.approval_status==='rejected'?'bad':'warn')}</td>
      <td>${esc(x.started_at||'')}</td>
      <td>${esc(x.duration_ms==null?'':x.duration_ms)}</td>
      <td>${esc((x.output_payload&&JSON.stringify(x.output_payload).slice(0,60))||x.error_message||'')}</td>
      <td><button class="secondary" data-rbac-action="${TiantongRbac.registerDynamicAction("execution-records-005","click",function(event){showDetail((i));})}>查看详情</button></td>
    </tr>`).join(''):'<tr><td colspan="10" class="muted">暂无执行记录</td></tr>';
    if(executions[0]) showDetail(0);
  }catch(e){
    $('state').className='tag bad';$('state').innerText='加载失败';
    $('rows').innerHTML=`<tr><td colspan="10" class="muted">${esc(e.message||'请稍后重试')}</td></tr>`;
  }
}
async function showDetail(index){
  const ex=executions[index]; if(!ex) return;
  $('executionId').value=ex.execution_id;
  $('detail').innerHTML=`<div class="row">
    <div>执行ID</div><div>${esc(ex.execution_id)}</div>
    <div>任务ID</div><div>${esc(ex.task_id||'—')}</div>
    <div>员工</div><div>${esc(ex.employee_name||ex.employee_code||ex.employee_id||'—')}</div>
    <div>能力</div><div>${esc(ex.capability_name||ex.capability_id)}</div>
    <div>状态</div><div>${esc(ex.status_label||ex.status)}</div>
    <div>审批状态</div><div>${esc(ex.approval_status_label||ex.approval_status)}</div>
    <div>风险</div><div>${esc(ex.risk_level)}</div>
    <div>执行器</div><div>${esc(ex.executor_type)}</div>
    <div>开始</div><div>${esc(ex.started_at||'—')}</div>
    <div>结束</div><div>${esc(ex.finished_at||'—')}</div>
    <div>耗时</div><div>${esc(ex.duration_ms==null?'—':ex.duration_ms+' ms')}</div>
    <div>错误码</div><div>${esc(ex.error_code||'—')}</div>
    <div>错误信息</div><div class="muted">${esc(ex.error_message||'—')}</div>
    <div>请求网址</div><div class="muted">${esc(ex.input_payload&&ex.input_payload.url?ex.input_payload.url:'—')}</div>
    <div>最终网址</div><div class="muted">${esc(ex.output_payload&&ex.output_payload.final_url?ex.output_payload.final_url:'—')}</div>
    <div>页面标题</div><div>${esc(ex.output_payload&&ex.output_payload.page_title?ex.output_payload.page_title:'—')}</div>
    <div>来源域名</div><div>${esc(ex.output_payload&&ex.output_payload.domain?ex.output_payload.domain:'—')}</div>
    <div>状态码</div><div>${esc(ex.output_payload&&ex.output_payload.status_code!=null?ex.output_payload.status_code:'—')}</div>
    <div>采集时间</div><div>${esc(ex.output_payload&&ex.output_payload.collected_at?ex.output_payload.collected_at:'—')}</div>
    <div>内容 Hash</div><div class="muted mono">${esc(ex.output_payload&&ex.output_payload.content_hash?ex.output_payload.content_hash:'—')}</div>
    <div>输入</div><div><pre>${esc(JSON.stringify(ex.input_payload||{},null,2))}</pre></div>
    <div>输出</div><div><pre>${esc(JSON.stringify(ex.output_payload||{},null,2))}</pre></div>
  </div>`;
  try{
    const audit=await api(`/api/v2/executions/${encodeURIComponent(ex.execution_id)}/audit`);
    $('auditBox').innerText=JSON.stringify(audit.items||[],null,2);
  }catch(e){
    $('auditBox').innerText=e.message||'暂无审计';
  }
}
async function approveExecution(){
  try{
    const id=$('executionId').value.trim(); if(!id){throw new Error('请先选择执行记录')}
    await api(`/api/v2/executions/${encodeURIComponent(id)}/approve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boss_confirmed:true,security_audited:true})});
    await loadExecutions(); $('state').className='tag ok'; $('state').innerText='已批准';
  }catch(e){$('state').className='tag bad';$('state').innerText=e.message||'批准失败'}
}
async function rejectExecution(){
  try{
    const id=$('executionId').value.trim(); if(!id){throw new Error('请先选择执行记录')}
    await api(`/api/v2/executions/${encodeURIComponent(id)}/reject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:$('cancelReason').value||'老板拒绝执行'})});
    await loadExecutions(); $('state').className='tag ok'; $('state').innerText='已拒绝';
  }catch(e){$('state').className='tag bad';$('state').innerText=e.message||'拒绝失败'}
}
async function cancelExecution(){
  try{
    const id=$('executionId').value.trim(); if(!id){throw new Error('请先选择执行记录')}
    await api(`/api/v2/executions/${encodeURIComponent(id)}/cancel`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:$('cancelReason').value||'执行已取消'})});
    await loadExecutions(); $('state').className='tag ok'; $('state').innerText='已取消';
  }catch(e){$('state').className='tag bad';$('state').innerText=e.message||'取消失败'}
}
init();
</script>

<script type="text/plain" data-rbac-protected>
TiantongRbac.bindActions({
  "execution-records-001":["click",function(event){approveExecution();}],
  "execution-records-002":["click",function(event){rejectExecution();}],
  "execution-records-003":["click",function(event){cancelExecution();}],
  "execution-records-004":["click",function(event){loadExecutions();}]
});
</script>
</body>
</html>
