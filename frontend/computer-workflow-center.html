<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试工作流中心</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 32px; background: #f8fafc; color: #0f172a; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; max-width: 960px; box-shadow: 0 10px 30px rgba(15,23,42,.06); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .item { border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; background: #f8fafc; }
    .label { font-size: 12px; color: #64748b; }
    .value { font-size: 22px; font-weight: 700; margin-top: 6px; }
    .muted { color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>测试工作流中心</h1>
    <p class="muted">最大 5 步、固定计划、关键节点必须审批、执行一步后自动暂停。</p>
    <div class="grid">
      <div class="item"><div class="label">工作流目标</div><div class="value">有限多步骤验证</div></div>
      <div class="item"><div class="label">步骤数量</div><div class="value">2 - 5</div></div>
      <div class="item"><div class="label">当前状态</div><div class="value">已暂停</div></div>
      <div class="item"><div class="label">风险等级</div><div class="value">低至中低</div></div>
      <div class="item"><div class="label">关键节点</div><div class="value">需要确认</div></div>
      <div class="item"><div class="label">生产开关</div><div class="value">关闭</div></div>
    </div>
  </div>
</body>
</html>
