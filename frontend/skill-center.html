<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>技能中心 - 天统AI云中台</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--nav:#101827;--blue:#2563eb;--green:#15803d;--yellow:#b45309;--red:#b91c1c}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
    .app{min-height:100vh;display:grid;grid-template-columns:240px minmax(0,1fr)}
    .side{background:var(--nav);color:#cbd5e1;padding:18px 14px}
    .brand{height:58px;color:#fff;font-size:18px;font-weight:800;padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    .menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}
    .menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}
    .menu a.active,.menu a:hover{background:#1f2937;color:#fff}
    .top{min-height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:12px}
    .top h1{font-size:19px;margin:0}
    .pill{display:inline-flex;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 10px;color:var(--muted);font-size:13px}
    .content{padding:24px}
    .hero,.section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}
    .hero h2{margin:0;font-size:24px}
    .hero p{color:var(--muted);line-height:1.65;margin:8px 0 0}
    .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
    .stat{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px}
    .stat .label{font-size:13px;color:var(--muted)}
    .stat .value{font-size:24px;font-weight:800;margin-top:8px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .section-head h3{margin:0;font-size:18px}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .filters input,.filters select{height:38px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;font-family:inherit;padding:0 10px;min-width:170px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;min-height:190px}
    .card h4{font-size:16px;margin:0 0 8px}
    .muted{color:var(--muted);line-height:1.65}
    .kv{display:grid;grid-template-columns:112px 1fr;gap:7px 10px;font-size:14px;margin-top:10px}
    .kv div:nth-child(odd){color:var(--muted)}
    .tag{border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;background:#f1f5f9;color:#475569;display:inline-flex;margin:2px}
    .tag.ok{background:#dcfce7;color:#166534}.tag.warn{background:#fef3c7;color:#92400e}.tag.bad{background:#fee2e2;color:#991b1b}
    .state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px;color:var(--muted);margin-bottom:16px}
    .state.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}
    .empty-state{text-align:center;border:1px dashed var(--line);border-radius:8px;padding:28px;color:var(--muted);background:#fbfdff}
    .btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#111827;color:#fff;font-size:14px}
    .btn.secondary{background:#fff;color:var(--ink)}
    @media(max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:760px){.app{grid-template-columns:1fr}.side{display:none}.top{align-items:flex-start;flex-direction:column}.content{padding:16px}.stats,.grid{grid-template-columns:1fr}.filters input,.filters select{width:100%;min-width:0}.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">天统AI云中台</div>
    <nav class="menu" aria-label="主导航">
      <a href="/enterprise-brain-console.html">企业大脑总控台</a>
      <a href="/ai-workforce.html">AI员工工作台</a>
      <a href="/ai-employee-capability.html">AI员工能力中心</a>
      <a class="active" href="/skill-center.html">技能中心</a>
      <a href="/skill-detail.html">技能详情</a>
      <a href="/tiancang.html">天藏知识资产中心</a>
    </nav>
  </aside>
  <main>
    <header class="top">
      <h1>技能中心</h1>
      <div class="pill">默认只读展示</div>
    </header>
    <section class="content">
      <div class="hero">
        <h2>统一 Skills Engine</h2>
        <p>这里管理 AI 员工可安装、可授权、可审计的技能。默认关闭真实执行能力，只展示经过审核的技能资产和调用记录。</p>
        <div class="empty-state" style="margin-top:12px">暂无数据</div>
      </div>
      <div id="pageState" class="state">正在加载技能中心...</div>

      <section class="section">
        <div class="section-head"><h3>技能总览</h3><span class="pill">只读视图</span></div>
        <div class="stats">
          <article class="stat"><div class="label">技能总数</div><div id="statTotal" class="value">--</div></article>
          <article class="stat"><div class="label">已安装数量</div><div id="statInstalled" class="value">--</div></article>
          <article class="stat"><div class="label">已启用数量</div><div id="statEnabled" class="value">--</div></article>
          <article class="stat"><div class="label">待审核数量</div><div id="statReview" class="value">--</div></article>
          <article class="stat"><div class="label">高风险数量</div><div id="statRisk" class="value">--</div></article>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h3>技能列表</h3>
          <div class="filters">
            <input id="searchInput" placeholder="搜索技能名称 / 编码" oninput="renderSkills()">
            <select id="statusFilter" onchange="renderSkills()"><option value="">全部状态</option></select>
            <select id="riskFilter" onchange="renderSkills()"><option value="">全部风险</option><option value="低风险">低风险</option><option value="中风险">中风险</option><option value="高风险">高风险</option><option value="极高风险">极高风险</option></select>
          </div>
        </div>
        <div id="skillGrid" class="grid"></div>
      </section>

      <section class="section">
        <div class="section-head"><h3>执行记录</h3><a class="btn secondary" href="/skill-detail.html">查看技能详情</a></div>
        <div id="invocationBox" class="empty-state">暂无执行记录</div>
      </section>
    </section>
  </main>
</div>
<script>
const empty='暂无';
let state={skills:[],summary:{},invocations:[]};
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function arr(value){return Array.isArray(value)?value:[]}
function text(value){return value===0?'0':(value?String(value):empty)}
function fmt(value){return value?String(value).slice(0,19).replace('T',' '):empty}
function tag(value){const v=String(value||empty);const k=v.includes('高')?'bad':(v.includes('待')?'warn':'ok');return `<span class="tag ${k}">${esc(v)}</span>`}
async function api(url){const res=await fetch(url,{credentials:'include'});const data=await res.json().catch(()=>({}));if(res.status===401){location.href='/login.html';throw new Error('请先登录');}if(res.status===403)throw new Error(data.detail||'当前账号无权访问技能中心');if(!res.ok)throw new Error(data.detail||'技能中心暂不可用');return data}
function renderOverview(){
  statTotal.innerText=text(state.summary.total ?? state.skills.length);
  statInstalled.innerText=text(state.summary.installed ?? state.skills.filter(row=>['已安装','已启用'].includes(row.status)).length);
  statEnabled.innerText=text(state.summary.enabled ?? state.skills.filter(row=>row.enabled).length);
  statReview.innerText=text(state.summary.awaiting_review ?? state.skills.filter(row=>['草稿','待审核'].includes(row.status)).length);
  statRisk.innerText=text(state.summary.high_risk ?? state.skills.filter(row=>['高风险','极高风险'].includes(row.risk_level)).length);
  statusFilter.innerHTML='<option value="">全部状态</option>'+[...new Set(state.skills.map(row=>row.status).filter(Boolean))].map(item=>`<option value="${esc(item)}">${esc(item)}</option>`).join('');
}
function filteredSkills(){
  const q=searchInput.value.trim().toLowerCase(),status=statusFilter.value,risk=riskFilter.value;
  return state.skills.filter(row=>{
    const hay=[row.skill_code,row.chinese_name,row.category,row.skill_type].join(' ').toLowerCase();
    return (!q||hay.includes(q))&&(!status||row.status===status)&&(!risk||row.risk_level===risk);
  });
}
function renderSkills(){
  const rows=filteredSkills();
  skillGrid.innerHTML=rows.length?rows.map(row=>`<article class="card">
    <h4>${esc(text(row.chinese_name))}</h4>
    <div class="muted">${esc(text(row.skill_code))}</div>
    <p class="muted">${esc(text(row.chinese_description))}</p>
    <div class="kv">
      <div>技能类型</div><div>${esc(text(row.skill_type))}</div>
      <div>分类</div><div>${esc(text(row.category))}</div>
      <div>状态</div><div>${tag(row.status)}</div>
      <div>风险等级</div><div>${tag(row.risk_level)}</div>
      <div>当前版本</div><div>${esc(text(row.current_version?.version || row.current_version_id))}</div>
      <div>已安装</div><div>${text(row.installed_count)}</div>
      <div>已启用</div><div>${text(row.enabled_count)}</div>
    </div>
    <div style="margin-top:12px"><a class="btn secondary" href="/skill-detail.html?code=${encodeURIComponent(row.skill_code)}">查看详情</a></div>
  </article>`).join(''):'<div class="empty-state">暂无技能数据</div>';
}
function renderInvocations(){
  const rows=arr(state.invocations);
  invocationBox.innerHTML=rows.length?rows.slice(0,8).map(row=>`<div class="state">
    <strong>${esc(text(row.status))}</strong> · ${esc(text(row.input_summary || row.output_summary || row.error_message))}
    <div class="muted">员工ID：${esc(text(row.employee_id))} · 开始：${esc(fmt(row.started_at))} · 时长：${esc(text(row.duration_ms))}ms</div>
  </div>`).join(''):'<div class="empty-state">暂无执行记录</div>';
}
async function init(){
  try{
    const [skills, invocations] = await Promise.all([
      api('/api/v2/skills'),
      api('/api/v2/skills/invocations')
    ]);
    state.skills=arr(skills.skills);
    state.summary=skills.summary||{};
    state.invocations=arr(invocations.invocations);
    renderOverview();
    renderSkills();
    renderInvocations();
    pageState.className='state ok';
    pageState.innerText='技能中心已加载，当前为只读管理视图。';
  }catch(error){
    pageState.className='state warn';
    pageState.innerText=error.message || '技能中心暂不可用。';
    renderOverview();
    renderSkills();
    renderInvocations();
  }
}
init();
</script>
</body>
</html>
