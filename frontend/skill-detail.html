<!doctype html>
<html lang="zh-CN" data-required-menu="menu.skills_center">
<head><style>html{visibility:hidden}</style><script src="/rbac-navigation.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>技能详情 - 天统AI云中台</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--nav:#101827;--blue:#2563eb;--green:#15803d;--yellow:#b45309;--red:#b91c1c}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
    .app{min-height:100vh;display:grid;grid-template-columns:240px minmax(0,1fr)}
    .side{background:var(--nav);color:#cbd5e1;padding:18px 14px}
    .brand{height:58px;color:#fff;font-size:18px;font-weight:800;padding:14px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    .menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}
    .menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}
    .menu a.active,.menu a:hover{background:#1f2937;color:#fff}
    .top{min-height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:12px}
    .top h1{font-size:19px;margin:0}
    .pill{display:inline-flex;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 10px;color:var(--muted);font-size:13px}
    .content{padding:24px}
    .hero,.section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}
    .hero h2{margin:0;font-size:24px}
    .hero p{color:var(--muted);line-height:1.65;margin:8px 0 0}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .section h3{font-size:18px;margin:0 0 12px}
    .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 12px;font-size:14px}
    .kv div:nth-child(odd){color:var(--muted)}
    .tag{border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;background:#f1f5f9;color:#475569;display:inline-flex;margin:2px}
    .tag.ok{background:#dcfce7;color:#166534}.tag.warn{background:#fef3c7;color:#92400e}.tag.bad{background:#fee2e2;color:#991b1b}
    .state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px;color:var(--muted);margin-bottom:16px}
    .state.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.state.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}
    .empty-state{text-align:center;border:1px dashed var(--line);border-radius:8px;padding:24px;color:var(--muted);background:#fbfdff}
    .btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#111827;color:#fff;font-size:14px}
    .btn.secondary{background:#fff;color:var(--ink)}
    .text{white-space:pre-wrap;line-height:1.7}
    @media(max-width:960px){.app{grid-template-columns:1fr}.side{display:none}.top{align-items:flex-start;flex-direction:column}.content{padding:16px}.grid{grid-template-columns:1fr}.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">天统AI云中台</div>
    <nav class="menu" aria-label="主导航">
      <a href="/enterprise-brain-console.html">企业大脑总控台</a>
      <a href="/skill-center.html">技能中心</a>
      <a class="active" href="/skill-detail.html">技能详情</a>
      <a href="/tiancang.html">天藏知识资产中心</a>
    </nav>
  </aside>
  <main>
    <header class="top">
      <h1>技能详情</h1>
      <div class="pill">只读查看</div>
    </header>
    <section class="content">
      <div class="hero">
        <h2 id="skillTitle">技能详情</h2>
        <p>查看技能版本、安装、授权、调用记录和审计信息。高风险技能默认不会自动启用。</p>
        <div class="empty-state" style="margin-top:12px">暂无数据</div>
      </div>
      <div id="pageState" class="state">正在加载技能详情...</div>

      <section class="section">
        <h3>基础信息</h3>
        <div id="basicBox" class="kv"></div>
      </section>

      <div class="grid">
        <section class="section">
          <h3>当前版本</h3>
          <div id="versionBox" class="text"></div>
        </section>
        <section class="section">
          <h3>授权记录</h3>
          <div id="permissionBox" class="text"></div>
        </section>
        <section class="section">
          <h3>安装记录</h3>
          <div id="installationBox" class="text"></div>
        </section>
        <section class="section">
          <h3>调用记录</h3>
          <div id="invocationBox" class="text"></div>
        </section>
        <section class="section">
          <h3>审计记录</h3>
          <div id="auditBox" class="text"></div>
        </section>
        <section class="section">
          <h3>安全边界</h3>
          <div class="text">技能不能绕过 Agent Runtime。默认不开启真实执行器、浏览器控制、电脑控制、手机控制和 Shell。</div>
        </section>
      </div>
    </section>
  </main>
</div>
<script type="text/plain" data-rbac-protected>
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function arr(value){return Array.isArray(value)?value:[]}
function fmt(value){return value?String(value).slice(0,19).replace('T',' '):'暂无'}
function text(value){return value===0?'0':(value?String(value):'暂无')}
function tag(value){const v=String(value||'暂无');const c=v.includes('高')?'bad':(v.includes('待')?'warn':'ok');return `<span class="tag ${c}">${esc(v)}</span>`}
async function api(url){const res=await fetch(url,{credentials:'include'});const data=await res.json().catch(()=>({}));if(res.status===401){location.href='/login.html';throw new Error('请先登录');}if(res.status===403)throw new Error(data.detail||'当前账号无权查看技能详情');if(!res.ok)throw new Error(data.detail||'技能详情暂不可用');return data}
function code(){return new URLSearchParams(location.search).get('code') || ''}
function renderSkill(data){
  const skill=data.skill||{};
  skillTitle.innerText=skill.chinese_name||'技能详情';
  basicBox.innerHTML=[
    ['技能编码', skill.skill_code],
    ['中文名称', skill.chinese_name],
    ['技能类型', skill.skill_type],
    ['分类', skill.category],
    ['状态', skill.status],
    ['风险等级', skill.risk_level],
    ['当前版本', skill.current_version_id],
    ['是否启用', skill.enabled ? '是' : '否'],
    ['是否废弃', skill.deprecated ? '是' : '否'],
    ['签名状态', skill.signature_status],
    ['来源类型', skill.source_type],
    ['来源地址', skill.source_url],
  ].map(([k,v])=>`<div>${esc(k)}</div><div>${typeof v==='boolean'? (v?'是':'否') : esc(text(v))}</div>`).join('');
  versionBox.innerHTML=arr(data.versions).map(version=>`<div class="state">
    <strong>版本 ${esc(text(version.version))}</strong>
    <div>输入能力：${esc(arr(version.required_capabilities).join('、')||'暂无')}</div>
    <div>所需权限：${esc(arr(version.required_permissions).join('、')||'暂无')}</div>
    <div>特性开关：${esc(arr(version.required_feature_flags).join('、')||'暂无')}</div>
    <div>发布说明：${esc(text(version.release_notes))}</div>
    <div>创建时间：${esc(fmt(version.created_at))}</div>
  </div>`).join('') || '<div class="empty-state">暂无版本</div>';
  permissionBox.innerHTML=arr(data.permissions).map(row=>`<div class="state">
    <strong>${esc(text(row.permission_scope))}</strong> · ${esc(text(row.department_id || row.employee_id || '全局'))}
    <div>是否允许：${row.allow ? '是' : '否'}</div>
    <div>风险限制：${esc(text(row.risk_limit))}</div>
    <div>环境限制：${esc(text(row.environment_limit))}</div>
  </div>`).join('') || '<div class="empty-state">暂无授权</div>';
  installationBox.innerHTML=arr(data.installations).map(row=>`<div class="state">
    <strong>${esc(text(row.status))}</strong>
    <div>员工ID：${esc(text(row.employee_id))}</div>
    <div>安装时间：${esc(fmt(row.installed_at))}</div>
    <div>启用时间：${esc(fmt(row.enabled_at))}</div>
  </div>`).join('') || '<div class="empty-state">暂无安装记录</div>';
  invocationBox.innerHTML=arr(data.invocations).map(row=>`<div class="state">
    <strong>${esc(text(row.status))}</strong>
    <div>输入：${esc(text(row.input_summary))}</div>
    <div>输出：${esc(text(row.output_summary))}</div>
    <div>错误：${esc(text(row.error_message || row.error_code))}</div>
  </div>`).join('') || '<div class="empty-state">暂无调用记录</div>';
  auditBox.innerHTML=arr(data.audit).map(row=>`<div class="state">
    <strong>${esc(text(row.action))}</strong>
    <div>${esc(text(row.detail))}</div>
    <div>时间：${esc(fmt(row.created_at))}</div>
  </div>`).join('') || '<div class="empty-state">暂无审计记录</div>';
}
async function init(){
  const c=code();
  if(!c){
    pageState.className='state warn';
    pageState.innerText='请通过技能中心点击“查看详情”。';
    return;
  }
  try{
    let data;
    try{
      data=await api('/api/v2/skills/code/'+encodeURIComponent(c));
    }catch(error){
      if(String(error.message||'').includes('404')){
        data=await api('/api/v2/skills/'+encodeURIComponent(c));
      }else{
        throw error;
      }
    }
    const [permissions, installations, invocations, audit]=await Promise.all([
      api('/api/v2/skills/'+encodeURIComponent(data.skill.skill_id)+'/permissions'),
      api('/api/v2/skills/'+encodeURIComponent(data.skill.skill_id)+'/installations'),
      api('/api/v2/skills/invocations'),
      api('/api/v2/skills/'+encodeURIComponent(data.skill.skill_id)+'/audit')
    ]);
    renderSkill({
      ...data,
      permissions: permissions.permissions,
      installations: installations.installations,
      invocations: invocations.invocations.filter(row=>String(row.skill_id)===String(data.skill.skill_id)).slice(0,10),
      audit: audit.audit
    });
    pageState.className='state ok';
    pageState.innerText='技能详情已加载。';
  }catch(error){
    pageState.className='state error';
    pageState.innerText=error.message || '技能详情暂不可用。';
    skillTitle.innerText='技能详情';
  }
}
init();
</script>
</body>
</html>
