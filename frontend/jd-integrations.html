<!doctype html>

<html lang="zh-CN">

<head>

  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">

  <title>京东数据接入 - 天统AI云中台</title>

  <style>

    :root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#111827;--good:#15803d;--bad:#b91c1c;--warn:#b45309}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.menu a.disabled{opacity:.5}.main{min-width:0}.topbar{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.ok{color:var(--good)}.content{padding:24px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}h1{margin:0;font-size:26px}.sub,.tip{color:var(--muted);line-height:1.7}.form-row,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}input,select{height:38px;border:1px solid #cbd5e1;border-radius:8px;padding:0 10px;background:white}button{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:1100px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc;color:#475569}.green{color:var(--good);font-weight:700}.red{color:var(--bad);font-weight:700}.yellow{color:var(--warn);font-weight:700}.state{border:1px solid var(--line);background:white;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:12px}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}@media(max-width:760px){.app{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}

  .auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}</style>

</head>

<body class="auth-pending">

<script>

(function(){

  if (window.__tiantongFrontSecurity) return;

  window.__tiantongFrontSecurity = true;

  const ALL_ACCESS = null;

  const ROLE_ACCESS = {

    owner: ALL_ACCESS,

    boss: ALL_ACCESS,

    admin:,

    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],

    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],

    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],

    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],

    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],

    designer: ['/ai-assets.html','/workflows.html'],

    editor: ['/ai-assets.html','/workflows.html'],

    finance: ['/jd-dashboard.html','/metrics.html','/import.html']

  };

  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};

  const rawFetch = window.fetch.bind(window);

  let currentUser = null;

  let redirecting = false;



  function normalizeRole(user){

    const raw = String((user && (user.role_code || user.role)) || '').trim();

    return ROLE_ALIASES[raw] || raw || 'guest';

  }

  function accessFor(role){

    if (role === 'owner') return ALL_ACCESS;

    return Object.prototype.hasOwnProperty.call(ROLE_ACCESS, role) ? ROLE_ACCESS[role] : ['/jd-dashboard.html'];

  }

  function canOpen(role, href){

    if (!href || href === '#' || href.startsWith('/api/')) return true;

    const normalizedHref = href === '/' ? '/index.html' : href;

    const access = accessFor(role);

    return access === ALL_ACCESS || access.includes(normalizedHref);

  }

  function firstAllowed(role){

    const access = accessFor(role);

    return access === ALL_ACCESS ? '/index.html' : (access[0] || '/login.html');

  }

  function currentPath(){

    return location.pathname === '/' ? '/index.html' : location.pathname;

  }

  function clearClientAuth(){

    try { localStorage.removeItem('token'); localStorage.removeItem('tiantong_token'); localStorage.removeItem('session'); localStorage.removeItem('tiantong_session'); sessionStorage.clear(); } catch(e) {}

  }

  function friendlyText(status, detail){

    if (status === 401) return detail || '????????????';

    if (status === 403) return detail || '??????????????????';

    return detail || '???????????';

  }

  function safeRedirect(url){

    if (redirecting) return;

    redirecting = true;

    setTimeout(function(){ location.href = url; }, 450);

  }

  function applyRoleUI(user){

    currentUser = user || currentUser;

    const role = normalizeRole(currentUser);

    document.querySelectorAll('.menu a, .quick a').forEach(function(link){

      const href = link.getAttribute('href') || '';

      const allowed = canOpen(role, href);

      link.style.display = allowed ? '' : 'none';

      link.setAttribute('aria-hidden', allowed ? 'false' : 'true');

    });

    const path = currentPath();

    if (path !== '/login.html' && !canOpen(role, path)) {

      alert('???????????????????????????');

      safeRedirect(firstAllowed(role));

      return;

    }

    document.body.classList.remove('auth-pending');

  }

  async function verifyLogin(){

    try {

      const res = await rawFetch('/api/me', {credentials:'include'});

      if (res.status === 401) {

        clearClientAuth();

        safeRedirect('/login.html');

        return;

      }

      if (!res.ok) throw new Error('????????');

      const user = await res.json();

      applyRoleUI(user);

    } catch(e) {

      document.body.classList.remove('auth-pending');

      const box = document.getElementById('notice') || document.getElementById('pageState') || document.getElementById('state');

      if (box) { box.className = 'state error'; box.innerText = '??????????????????'; }

    }

  }

  window.fetch = async function(input, init){

    const res = await rawFetch(input, init);

    const url = typeof input === 'string' ? input : (input && input.url) || '';

    if (url.includes('/api/me') && res.ok) {

      res.clone().json().then(applyRoleUI).catch(function(){});

    }

    if (url.includes('/api/') && res.status === 401) {

      clearClientAuth();

      alert('????????????');

      safeRedirect('/login.html');

    }

    if (url.includes('/api/') && res.status === 403) {

      res.clone().json().then(function(data){ alert(friendlyText(403, data.detail)); }).catch(function(){ alert(friendlyText(403)); });

      clearClientAuth();

      safeRedirect('/login.html');

    }

    return res;

  };

  window.secureLogout = async function(){

    clearClientAuth();

    try { await rawFetch('/api/logout', {method:'POST', credentials:'include'}); } catch(e) {}

    location.href = '/login.html';

  };

  const keepLogoutSafe = setInterval(function(){ window.logout = window.secureLogout; }, 50);

  setTimeout(function(){ clearInterval(keepLogoutSafe); window.logout = window.secureLogout; }, 3000);

  document.addEventListener('DOMContentLoaded', function(){ if (currentUser) applyRoleUI(currentUser); });

  new MutationObserver(function(){ if (currentUser) applyRoleUI(currentUser); }).observe(document.body, {childList:true, subtree:true});

  verifyLogin();

})();

</script>

<div class="app"><aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside><main class="main">

    <header class="topbar"><strong>京东数据接入</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>

    <section class="content">

      <div class="card"><h1>京东数据接入中心</h1><p class="sub">京东商智 / 京准通 / 京东开放平台 / 手动导入 / 浏览器自动采集接入状态。</p></div>

      <div class="card"><h2>新增数据接入</h2><p class="tip">不要填写京东登录密码。正式接入优先使用官方授权/API，没有接口的数据再评估浏览器自动采集或手动导入。</p><div class="form-row"><select id="store_id"></select><select id="source_type"><option value="jd_sz">京东商智：成交/访客/转化</option><option value="jd_jzt">京准通：广告费/ROI/投流</option><option value="jd_open">京东开放平台：订单/商品/售后</option><option value="manual_import">手动导入：Excel/CSV</option><option value="browser_auto">浏览器自动采集：待开发</option></select><select id="connection_mode"><option value="pending">待配置</option><option value="official_api">官方API授权</option><option value="browser_auto">浏览器自动采集</option><option value="excel_import">Excel导入</option></select><input id="merchant_id" placeholder="商家ID/店铺ID"><input id="app_key" placeholder="AppKey"><input id="notes" placeholder="备注"><button onclick="createIntegration()">新增接入</button></div></div>

      <div class="card"><h2>接入列表</h2><div class="toolbar"><input id="search" placeholder="搜索店铺/来源/备注" oninput="renderList()"><select id="sourceFilter" onchange="renderList()"><option value="">全部来源</option><option value="jd_sz">京东商智</option><option value="jd_jzt">京准通</option><option value="jd_open">京东开放平台</option><option value="manual_import">手动导入</option><option value="browser_auto">浏览器自动采集</option></select><select id="statusFilter" onchange="renderList()"><option value="">全部状态</option><option value="authorized">已授权</option><option value="pending">待接入</option><option value="error">异常</option><option value="disabled">停用</option></select><button class="secondary" onclick="loadIntegrations()">刷新表格</button></div></div>

      <div id="pageState" class="state">正在加载接入配置...</div>

      <div class="table-wrap"><table><thead><tr><th>ID</th><th>店铺</th><th>数据来源</th><th>接入方式</th><th>商家ID</th><th>AppKey</th><th>状态</th><th>备注</th><th>启用</th><th>操作</th></tr></thead><tbody id="integrations"></tbody></table></div>

    </section></main></div>

  <script>

    const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工中心','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['天藏：知识资产中心','/knowledge-center.html'],['系统设置','/settings.html']];let rows=[];

    function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/jd-integrations.html'?'active ':''}${h.startsWith('#')?'disabled':''}" href="${h}" ${h.startsWith('#')?'onclick="return disabledEntry()"':''}>${l}</a>`).join('')}function disabledEntry(){alert('账号资料中心入口已预留，等待后端页面路由开放。');return false}function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}async function logout(){await fetch('/api/logout',{method:'POST',credentials:'include'});location.href='/login.html'}async function api(url,opt={}){const r=await fetch(url,{credentials:'include',...opt});if(r.status===401){location.href='/login.html';return}if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||'请求失败')}return r.json()}async function init(){renderMenu();tick();setInterval(tick,1000);const user=await api('/api/me');me.innerText=`${user.display_name} · ${user.role_label||user.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';if(h)systemStatus.classList.add('ok')}

    function sourceName(v){return {jd_sz:'京东商智',jd_jzt:'京准通',jd_open:'京东开放平台',manual_import:'手动导入',browser_auto:'浏览器自动采集'}[v]||v}function modeName(v){return {pending:'待配置',official_api:'官方API授权',browser_auto:'浏览器自动采集',excel_import:'Excel导入'}[v]||v}function statusHtml(v){if(v==='authorized')return'<span class="green">已授权</span>';if(v==='error')return'<span class="red">异常</span>';if(v==='disabled')return'<span class="red">停用</span>';return'<span class="yellow">待接入</span>'}

    async function loadStores(){const stores=await api('/api/stores');store_id.innerHTML=stores.length?stores.map(s=>`<option value="${s.id}">${s.store_code}｜${s.store_name}</option>`).join(''):'<option value="">暂无店铺</option>'}

    async function loadIntegrations(){try{pageState.className='state';pageState.innerText='正在加载接入配置...';rows=await api('/api/jd/integrations');renderList()}catch(e){pageState.className='state error';pageState.innerText=e.message||'接入配置加载失败';integrations.innerHTML='<tr><td colspan="10">加载失败，请刷新重试</td></tr>'}}

    function renderList(){const q=search.value.trim().toLowerCase(),sf=sourceFilter.value,st=statusFilter.value;const list=rows.filter(i=>(!sf||i.source_type===sf)&&(!st||i.status===st)&&(!q||[i.store_code,i.store_name,sourceName(i.source_type),i.notes].join(' ').toLowerCase().includes(q)));pageState.innerText=list.length?`已显示 ${list.length} / ${rows.length} 条接入配置。未授权来源会等待后端采集服务完成。`:'暂无符合条件的接入配置。接口开发中 / 等待后端采集服务完成。';integrations.innerHTML=list.length?list.map(i=>`<tr><td>${i.id}</td><td>${i.store_code}｜${i.store_name}</td><td>${sourceName(i.source_type)}</td><td>${modeName(i.connection_mode)}</td><td>${i.merchant_id||''}</td><td>${i.app_key||''}</td><td>${statusHtml(i.status)}</td><td>${i.notes||''}</td><td>${i.active?'<span class="green">启用</span>':'<span class="red">停用</span>'}</td><td><button onclick="setStatus(${i.id},'authorized')">已授权</button> <button onclick="setStatus(${i.id},'error')">异常</button> <button onclick="toggleIntegration(${i.id})">${i.active?'停用':'启用'}</button></td></tr>`).join(''):'<tr><td colspan="10">暂无接入配置</td></tr>'}

    async function createIntegration(){try{await api('/api/jd/integrations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({store_id:Number(store_id.value),source_type:source_type.value,connection_mode:connection_mode.value,merchant_id:merchant_id.value.trim(),app_key:app_key.value.trim(),notes:notes.value.trim()})});await loadIntegrations();alert('接入记录已新增')}catch(e){alert(e.message)}}async function setStatus(id,status){try{await api(`/api/jd/integrations/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});await loadIntegrations()}catch(e){alert(e.message)}}async function toggleIntegration(id){try{await api(`/api/jd/integrations/${id}/toggle`,{method:'POST'});await loadIntegrations()}catch(e){alert(e.message)}}

    init().then(loadStores).then(loadIntegrations).catch(e=>{pageState.className='state error';pageState.innerText=e.message||'页面加载失败'});

  </script>

</body>

</html>
