<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI任务中心 - 天统AI云中台</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--brand:#0f766e;--dark:#111827;--good:#15803d;--warn:#b45309;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.auth-pending .sidebar,.auth-pending .main,.auth-pending main{visibility:hidden}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:#fff}.main{min-width:0}.topbar{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:16px}.top-meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px}.ok{color:var(--good)}.content{padding:24px}.hero{background:linear-gradient(135deg,#0f766e,#111827);color:white;border-radius:8px;padding:22px;margin-bottom:16px}.hero h1{margin:0;font-size:26px}.hero p{margin:8px 0 0;color:#d1fae5}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}.layout{display:grid;grid-template-columns:minmax(0,1.2fr) 420px;gap:16px}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}input,select,textarea{border:1px solid #cbd5e1;border-radius:8px;background:white;font-family:inherit}input,select{height:38px;padding:0 10px}textarea{width:100%;min-height:92px;padding:10px;resize:vertical}.toolbar input{width:240px}button{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:white;color:var(--ink);border:1px solid var(--line)}button.good{background:var(--good)}button.warn{background:var(--warn)}button.bad{background:var(--bad)}button:disabled{opacity:.55;cursor:not-allowed}.state{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px 14px;color:var(--muted);margin-bottom:12px}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc;color:#475569}.tag{display:inline-block;border-radius:999px;padding:4px 9px;background:#e2e8f0;font-size:12px}.tag.created,.tag.split{background:#e0f2fe;color:#075985}.tag.assigned{background:#ede9fe;color:#5b21b6}.tag.running{background:#fef3c7;color:#92400e}.tag.result_submitted{background:#dcfce7;color:#166534}.tag.accepted,.tag.audited,.tag.summarized{background:#d1fae5;color:#065f46}.tag.rejected{background:#fee2e2;color:#991b1b}.priority-high,.priority-urgent{color:#b91c1c;font-weight:700}.priority-normal{color:#0f766e;font-weight:700}.detail-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.muted{color:var(--muted);line-height:1.7}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-grid .full{grid-column:1/-1}.section-title{font-size:15px;font-weight:700;margin:16px 0 8px}.log-list,.entry-list{display:flex;flex-direction:column;gap:8px}.entry,.log{border:1px solid var(--line);border-radius:8px;background:#f8fafc;padding:10px}.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.open{display:flex}.modal-panel{width:min(760px,100%);max-height:90vh;overflow:auto;background:white;border-radius:8px;border:1px solid var(--line);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}@media(max-width:1120px){.app{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}@media(max-width:640px){.form-grid{grid-template-columns:1fr}.toolbar input{width:100%}}
  </style>
</head>
<body class="auth-pending">
<script>
(function(){
  if (window.__tiantongFrontSecurity) return;
  window.__tiantongFrontSecurity = true;
  const ALL_ACCESS = null;
  const ROLE_ACCESS = {
    owner: ALL_ACCESS,
    boss: ALL_ACCESS,
    admin: ['/index.html','/control.html','/stores.html','/jd-dashboard.html','/jd-integrations.html','/task-center.html','/metrics.html','/import.html','/ai-employees.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html','/ai-assets.html','/settings.html'],
    operation: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    operator: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    ops: ['/stores.html','/jd-dashboard.html','/jd-integrations.html','/metrics.html','/import.html','/workflows.html','/account-center.html','/template-center.html','/brands.html','/store-groups.html'],
    customer_service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    service: ['/jd-dashboard.html','/metrics.html','/account-center.html','/workflows.html'],
    designer: ['/ai-assets.html','/workflows.html'],
    editor: ['/ai-assets.html','/workflows.html'],
    finance: ['/jd-dashboard.html','/metrics.html','/import.html']
  };
  const ROLE_ALIASES = {boss:'owner', owner:'owner', administrator:'admin', ads:'operation', operator:'operation', ops:'operation', service:'customer_service'};
  const rawFetch = window.fetch.bind(window);
  let currentUser = null;
  let redirecting = false;
  function normalizeRole(user){const raw=String((user&&(user.role_code||user.role))||'').trim();return ROLE_ALIASES[raw]||raw||'guest'}
  function accessFor(role){if(role==='owner')return ALL_ACCESS;return Object.prototype.hasOwnProperty.call(ROLE_ACCESS,role)?ROLE_ACCESS[role]:['/jd-dashboard.html']}
  function canOpen(role,href){if(!href||href==='#'||href.startsWith('/api/'))return true;const normalizedHref=href==='/'?'/index.html':href;const access=accessFor(role);return access===ALL_ACCESS||access.includes(normalizedHref)}
  function firstAllowed(role){const access=accessFor(role);return access===ALL_ACCESS?'/index.html':(access[0]||'/login.html')}
  function currentPath(){return location.pathname==='/'?'/index.html':location.pathname}
  function clearClientAuth(){try{localStorage.removeItem('token');localStorage.removeItem('tiantong_token');localStorage.removeItem('session');localStorage.removeItem('tiantong_session');sessionStorage.clear()}catch(e){}}
  function friendlyText(status,detail){if(status===401)return detail||'登录已失效，请重新登录。';if(status===403)return detail||'当前账号没有访问该页面或接口的权限。';return detail||'请求失败，请稍后重试。'}
  function safeRedirect(url){if(redirecting)return;redirecting=true;setTimeout(function(){location.href=url},450)}
  function applyRoleUI(user){currentUser=user||currentUser;const role=normalizeRole(currentUser);document.querySelectorAll('.menu a').forEach(function(link){const href=link.getAttribute('href')||'';const allowed=canOpen(role,href);link.style.display=allowed?'':'none';link.setAttribute('aria-hidden',allowed?'false':'true')});const path=currentPath();if(path!=='/login.html'&&!canOpen(role,path)){alert('当前账号没有访问该页面的权限，已为你跳转到可用工作台。');safeRedirect(firstAllowed(role));return}document.body.classList.remove('auth-pending')}
  async function verifyLogin(){try{const res=await rawFetch('/api/me',{credentials:'include'});if(res.status===401){clearClientAuth();safeRedirect('/login.html');return}if(!res.ok)throw new Error('登录状态检查失败');const user=await res.json();applyRoleUI(user)}catch(e){document.body.classList.remove('auth-pending');const box=document.getElementById('pageState');if(box){box.className='state error';box.innerText='登录状态检查失败，请刷新或重新登录。'}}}
  window.fetch=async function(input,init){const res=await rawFetch(input,init);const url=typeof input==='string'?input:((input&&input.url)||'');if(url.includes('/api/me')&&res.ok){res.clone().json().then(applyRoleUI).catch(function(){})}if(url.includes('/api/')&&res.status===401){clearClientAuth();alert('登录已失效，请重新登录。');safeRedirect('/login.html')}if(url.includes('/api/')&&res.status===403){res.clone().json().then(function(data){alert(friendlyText(403,data.detail))}).catch(function(){alert(friendlyText(403))});clearClientAuth();safeRedirect('/login.html')}return res};
  window.secureLogout=async function(){clearClientAuth();try{await rawFetch('/api/logout',{method:'POST',credentials:'include'})}catch(e){}location.href='/login.html'};
  const keepLogoutSafe=setInterval(function(){window.logout=window.secureLogout},50);setTimeout(function(){clearInterval(keepLogoutSafe);window.logout=window.secureLogout},3000);
  document.addEventListener('DOMContentLoaded',function(){if(currentUser)applyRoleUI(currentUser)});
  new MutationObserver(function(){if(currentUser)applyRoleUI(currentUser)}).observe(document.documentElement,{childList:true,subtree:true});
  verifyLogin();
})();
</script>
  <div class="app">
    <aside class="sidebar"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside>
    <main class="main">
      <header class="topbar"><strong>AI任务中心</strong><div class="top-meta"><span id="currentTime" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header>
      <section class="content">
        <div class="hero"><h1>AI员工任务调度中心</h1><p>创建任务、分配AI员工、提交结果、天检验收、天监审计、天统汇总和审计日志查看。</p></div>
        <div class="layout">
          <div>
            <div class="card">
              <div class="toolbar">
                <input id="search" placeholder="搜索任务标题/AI员工/负责人" oninput="renderTasks()">
                <select id="statusFilter" onchange="loadTasks()"><option value="">全部状态</option></select>
                <button onclick="openCreateModal()">创建任务</button>
                <button class="secondary" onclick="loadTasks()">刷新</button>
              </div>
            </div>
            <div id="pageState" class="state">正在加载任务...</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>ID</th><th>任务</th><th>状态</th><th>负责人 / AI员工</th><th>优先级</th><th>创建时间</th><th>操作</th></tr></thead>
                <tbody id="taskRows"></tbody>
              </table>
            </div>
          </div>
          <aside>
            <div id="detailPanel" class="card">
              <div class="detail-title"><h2>任务详情</h2><button class="secondary" onclick="clearDetail()">清空</button></div>
              <div class="muted">从左侧任务列表选择一条任务查看详情。</div>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div id="createModal" class="modal">
    <div class="modal-panel">
      <div class="modal-head"><h2>创建任务</h2><button class="secondary" onclick="closeCreateModal()">关闭</button></div>
      <div class="form-grid">
        <div class="full"><label>任务标题</label><input id="newTitle" placeholder="例如：生成今日60店经营分析"></div>
        <div><label>优先级</label><input id="newPriority" placeholder="normal"></div>
        <div><label>父任务ID</label><input id="newParentTaskId" type="number" placeholder="可不填"></div>
        <div class="full"><label>任务描述</label><textarea id="newDescription" placeholder="老板任务要求"></textarea></div>
        <div class="full"><label>拆分计划</label><textarea id="newSplitPlan" placeholder="可不填；填写后后端状态为 split"></textarea></div>
      </div>
      <div class="action-row"><button onclick="createTask()">保存任务</button></div>
    </div>
  </div>

  <script>
    const TASK_STATUSES = ['created','split','assigned','running','result_submitted','accepted','rejected','audited','summarized'];
    const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI任务中心','/task-center.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['系统设置','/settings.html']];
    let tasks = [];
    let selectedTask = null;
    let aiEmployees = [];

    function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/task-center.html'?'active':''}" href="${h}">${l}</a>`).join('')}
    function tick(){currentTime.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}
    async function logout(){await window.secureLogout()}
    async function api(url, options={}){const res=await fetch(url,{credentials:'include',...options});if(!res.ok){const data=await res.json().catch(()=>({}));throw new Error(data.detail||'操作失败')}return res.json()}
    function statusTag(status){return `<span class="tag ${status}">${status}</span>`}
    function fmtTime(value){return value ? value.slice(0,19).replace('T',' ') : '-'}
    function priorityClass(value){return `priority-${String(value||'normal').toLowerCase()}`}
    function escapeHtml(text){return String(text||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    async function init(){
      renderMenu();
      TASK_STATUSES.forEach(s=>statusFilter.insertAdjacentHTML('beforeend',`<option value="${s}">${s}</option>`));
      tick();setInterval(tick,1000);
      const user=await api('/api/me');me.innerText=`${user.display_name} · ${user.role_label||user.role}`;
      const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';if(h)systemStatus.classList.add('ok');
      await loadAiEmployees();
      await loadTasks();
    }

    async function loadAiEmployees(){
      try { aiEmployees = await api('/api/ai-employees?status=active&include_legacy=false'); }
      catch(e) { aiEmployees = []; }
    }

    async function loadTasks(){
      try{
        pageState.className='state';pageState.innerText='正在加载任务...';
        const qs=statusFilter.value?`?status=${encodeURIComponent(statusFilter.value)}`:'';
        tasks=await api(`/api/task-center/tasks${qs}`);
        renderTasks();
      }catch(e){
        pageState.className='state error';pageState.innerText=e.message||'任务加载失败';taskRows.innerHTML='<tr><td colspan="7">加载失败，请刷新重试</td></tr>';
      }
    }

    function renderTasks(){
      const q=search.value.trim().toLowerCase();
      const rows=tasks.filter(t=>!q||[t.title,t.description,t.assigned_ai_employee_code,t.assigned_ai_employee_name,t.created_by&&t.created_by.display_name].join(' ').toLowerCase().includes(q));
      pageState.className='state';pageState.innerText=rows.length?`已显示 ${rows.length} / ${tasks.length} 个任务。`:'暂无符合条件的任务。';
      taskRows.innerHTML=rows.length?rows.map(t=>`<tr>
        <td>${t.id}</td>
        <td><strong>${escapeHtml(t.title)}</strong><div class="muted">${escapeHtml(t.description||'')}</div></td>
        <td>${statusTag(t.status)}</td>
        <td>${t.created_by?escapeHtml(t.created_by.display_name):'-'}<br><span class="muted">${escapeHtml(t.assigned_ai_employee_name||t.assigned_ai_employee_code||'未分配')}</span></td>
        <td class="${priorityClass(t.priority)}">${escapeHtml(t.priority||'normal')}</td>
        <td>${fmtTime(t.created_at)}</td>
        <td><button class="secondary" onclick="loadDetail(${t.id})">详情</button></td>
      </tr>`).join(''):'<tr><td colspan="7">暂无任务</td></tr>';
    }

    async function loadDetail(taskId){
      try{
        selectedTask = await api(`/api/task-center/tasks/${taskId}`);
        const logs = await api(`/api/task-center/tasks/${taskId}/audit-logs`);
        renderDetail(selectedTask, logs);
      }catch(e){alert(e.message)}
    }

    function aiOptions(){
      return aiEmployees.map(a=>`<option value="${escapeHtml(a.employee_code)}">${escapeHtml(formatEmployeeOption(a))}</option>`).join('');
    }

    function formatEmployeeOption(employee){
      const name = employee.employee_name || employee.employee_code;
      const code = employee.employee_code || '';
      const legion = employee.legion || '未设置军团';
      return `${name}（${code}）- ${legion}`;
    }

    function renderDetail(task, logs){
      detailPanel.innerHTML=`<div class="detail-title"><div><h2>${escapeHtml(task.title)}</h2><div class="muted">#${task.id} · ${statusTag(task.status)} · 优先级：${escapeHtml(task.priority||'normal')}</div></div><button class="secondary" onclick="clearDetail()">清空</button></div>
        <div class="section-title">任务说明</div><div class="muted">${escapeHtml(task.description||'暂无说明')}</div>
        <div class="section-title">分配AI员工</div>
        <input id="assignCode" list="aiEmployeeOptions" placeholder="AI员工code" value="${escapeHtml(task.assigned_ai_employee_code||'')}">
        <datalist id="aiEmployeeOptions">${aiOptions()}</datalist>
        <input id="assignName" placeholder="AI员工名称，可选" value="${escapeHtml(task.assigned_ai_employee_name||'')}">
        <input id="assignDetail" placeholder="分配说明，可选">
        <div class="action-row"><button onclick="assignTask(${task.id})">分配AI员工</button><button class="secondary" onclick="startTask(${task.id})">开始任务</button></div>
        <div class="section-title">更新任务状态</div>
        <select id="statusUpdate">${TASK_STATUSES.map(s=>`<option value="${s}" ${s===task.status?'selected':''}>${s}</option>`).join('')}</select>
        <input id="statusDetail" placeholder="状态变更说明，可选">
        <div class="action-row"><button class="secondary" onclick="updateStatus(${task.id})">更新状态</button></div>
        <div class="section-title">AI员工提交结果</div>
        <textarea id="resultContent" placeholder="填写AI员工执行结果"></textarea>
        <input id="resultAttachments" placeholder="附件，多个用逗号分隔，可选">
        <div class="action-row"><button onclick="submitResult(${task.id})">提交结果</button></div>
        <div class="section-title">天检验收</div>
        <select id="reviewStatus"><option value="accepted">accepted</option><option value="rejected">rejected</option></select>
        <textarea id="reviewComment" placeholder="天检验收意见"></textarea>
        <div class="action-row"><button class="good" onclick="submitReview(${task.id})">提交验收</button></div>
        <div class="section-title">天监审计</div>
        <textarea id="auditComment" placeholder="天监审计意见"></textarea>
        <div class="action-row"><button class="warn" onclick="submitAudit(${task.id})">提交审计</button></div>
        <div class="section-title">天统汇总</div>
        <textarea id="summaryContent" placeholder="天统汇总内容">${escapeHtml(task.summary||'')}</textarea>
        <div class="action-row"><button onclick="submitSummary(${task.id})">提交汇总</button></div>
        <div class="section-title">结果记录</div><div class="entry-list">${(task.results||[]).map(r=>`<div class="entry"><strong>${escapeHtml(r.ai_employee_name||r.ai_employee_code)}</strong><div class="muted">${fmtTime(r.created_at)}</div><div>${escapeHtml(r.result_content)}</div></div>`).join('')||'<div class="muted">暂无结果</div>'}</div>
        <div class="section-title">验收/审计记录</div><div class="entry-list">${(task.reviews||[]).map(r=>`<div class="entry"><strong>${escapeHtml(r.review_type)} · ${escapeHtml(r.review_status)}</strong><div class="muted">${fmtTime(r.created_at)} · ${escapeHtml(r.reviewer_role||'')}</div><div>${escapeHtml(r.comment||'')}</div></div>`).join('')||'<div class="muted">暂无记录</div>'}</div>
        <div class="section-title">审计日志</div><div class="log-list">${(logs||[]).map(l=>`<div class="log"><strong>${escapeHtml(l.action)}</strong><div class="muted">${fmtTime(l.created_at)} · ${escapeHtml(l.from_status||'-')} → ${escapeHtml(l.to_status||'-')} · ${escapeHtml(l.actor_role||'')}</div><div>${escapeHtml(l.detail||'')}</div></div>`).join('')||'<div class="muted">暂无审计日志</div>'}</div>`;
    }

    function clearDetail(){selectedTask=null;detailPanel.innerHTML='<div class="detail-title"><h2>任务详情</h2><button class="secondary" onclick="clearDetail()">清空</button></div><div class="muted">从左侧任务列表选择一条任务查看详情。</div>'}
    function openCreateModal(){createModal.classList.add('open')}
    function closeCreateModal(){createModal.classList.remove('open')}

    async function createTask(){
      try{
        const body={title:newTitle.value.trim(),description:newDescription.value.trim(),priority:newPriority.value.trim()||'normal',split_plan:newSplitPlan.value.trim()||null};
        if(newParentTaskId.value) body.parent_task_id=Number(newParentTaskId.value);
        await api('/api/task-center/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        closeCreateModal();newTitle.value='';newDescription.value='';newPriority.value='';newParentTaskId.value='';newSplitPlan.value='';
        await loadTasks();
      }catch(e){alert(e.message)}
    }
    async function updateStatus(id){try{await api(`/api/task-center/tasks/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:statusUpdate.value,detail:statusDetail.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function assignTask(id){try{const code=assignCode.value.trim();if(!code){alert('请选择AI员工');return}const selected=aiEmployees.find(e=>e.employee_code===code);await api(`/api/task-center/tasks/${id}/assign`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ai_employee_code:code,ai_employee_name:assignName.value.trim()||(selected&&selected.employee_name)||null,detail:assignDetail.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function startTask(id){try{await api(`/api/task-center/tasks/${id}/start`,{method:'POST'});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function submitResult(id){try{const content=resultContent.value.trim();if(!content){alert('请填写结果内容');return}const attachments=resultAttachments.value.split(',').map(s=>s.trim()).filter(Boolean);await api(`/api/task-center/tasks/${id}/results`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({result_content:content,attachments})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function submitReview(id){try{await api(`/api/task-center/tasks/${id}/reviews`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({review_status:reviewStatus.value,comment:reviewComment.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function submitAudit(id){try{await api(`/api/task-center/tasks/${id}/audits`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({review_status:'audited',comment:auditComment.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}
    async function submitSummary(id){try{const summary=summaryContent.value.trim();if(!summary){alert('请填写汇总内容');return}await api(`/api/task-center/tasks/${id}/summary`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}

    init().catch(e=>{pageState.className='state error';pageState.innerText=e.message||'页面加载失败'});
  </script>
</body>
</html>
