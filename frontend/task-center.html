<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI任务中心 - 天统AI云中台</title><style>
:root{--bg:#f4f6f8;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--dark:#101827;--good:#15803d;--warn:#b45309;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}.app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.side{background:#101827;color:#cbd5e1;padding:18px 14px}.brand{height:56px;color:white;font-size:19px;font-weight:700;padding:15px 10px;border-bottom:1px solid rgba(255,255,255,.08)}.menu{display:flex;flex-direction:column;gap:4px;margin-top:14px}.menu a{color:#cbd5e1;text-decoration:none;padding:10px 12px;border-radius:8px;font-size:14px}.menu a.active,.menu a:hover{background:#1f2937;color:white}.top{min-height:64px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:12px}.meta,.toolbar,.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 9px;color:var(--muted);font-size:13px}.content{padding:24px}.hero{background:linear-gradient(135deg,#0f766e,#111827);color:white;border-radius:8px;padding:22px;margin-bottom:16px}.hero h1{margin:0;font-size:26px}.hero p{color:#d1fae5}.layout{display:grid;grid-template-columns:minmax(0,1.2fr) 440px;gap:16px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}.state{border:1px solid var(--line);background:white;border-radius:8px;padding:12px;color:var(--muted);margin-bottom:12px}.state.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}.state.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:white}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:12px;border-bottom:1px solid var(--line);font-size:14px;text-align:left;vertical-align:top}th{background:#f8fafc;color:#475569}input,select,textarea{border:1px solid #cbd5e1;border-radius:8px;background:white;font-family:inherit;padding:10px}input,select{height:38px}textarea{width:100%;min-height:88px;resize:vertical}.toolbar input{width:240px}button{border:0;background:var(--dark);color:white;border-radius:8px;padding:9px 13px;cursor:pointer}button.secondary{background:white;color:var(--ink);border:1px solid var(--line)}button.good{background:var(--good)}button.warn{background:var(--warn)}button:disabled{opacity:.55;cursor:not-allowed}.tag{display:inline-block;border-radius:999px;padding:4px 9px;background:#e2e8f0;font-size:12px}.tag.created,.tag.split{background:#e0f2fe;color:#075985}.tag.assigned{background:#ede9fe;color:#5b21b6}.tag.running{background:#fef3c7;color:#92400e}.tag.result_submitted,.tag.accepted,.tag.audited,.tag.summarized{background:#d1fae5;color:#065f46}.tag.rejected{background:#fee2e2;color:#991b1b}.muted{color:var(--muted);line-height:1.7}.section-title{font-size:15px;font-weight:700;margin:16px 0 8px}.entry,.log,.link-card{border:1px solid var(--line);border-radius:8px;background:#f8fafc;padding:10px;margin-top:8px}.link-grid{display:grid;grid-template-columns:150px 1fr;gap:6px 10px;font-size:13px}.link-grid div:nth-child(odd){color:var(--muted)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.panel{width:min(760px,100%);max-height:90vh;overflow:auto;background:white;border-radius:8px;padding:18px}@media(max-width:1120px){.app{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.content{padding:18px}}@media(max-width:640px){.form-grid,.link-grid{grid-template-columns:1fr}.full{grid-column:auto}.toolbar input{width:100%}}
</style></head><body><div class="app"><aside class="side"><div class="brand">天统AI云中台</div><nav id="menu" class="menu"></nav></aside><main><header class="top"><strong>AI任务中心</strong><div class="meta"><span id="time" class="pill"></span><span id="systemStatus" class="pill">系统检查中</span><span id="me" class="pill">加载中</span><button onclick="logout()">退出登录</button></div></header><section class="content"><div class="hero"><h1>AI员工任务调度中心</h1><p>创建任务、分配AI员工、提交结果、天检验收、天监审计、天统汇总和审计日志查看。</p></div><div class="layout"><div><div class="card"><div class="toolbar"><input id="search" placeholder="搜索任务标题/AI员工/负责人" oninput="renderTasks()"><select id="statusFilter" onchange="loadTasks()"><option value="">全部状态</option></select><button onclick="openCreateModal()">创建任务</button><button class="secondary" onclick="loadTasks()">刷新</button></div></div><div id="pageState" class="state">正在加载任务...</div><div class="table"><table><thead><tr><th>ID</th><th>任务</th><th>状态</th><th>负责人 / AI员工</th><th>优先级</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="taskRows"></tbody></table></div></div><aside><div id="detailPanel" class="card"><div class="actions" style="justify-content:space-between"><h2>任务详情</h2><button class="secondary" onclick="clearDetail()">清空</button></div><div class="muted">从左侧任务列表选择一条任务查看详情。</div></div></aside></div></section></main></div><div id="createModal" class="modal"><div class="panel"><div class="actions" style="justify-content:space-between"><h2>创建任务</h2><button class="secondary" onclick="closeCreateModal()">关闭</button></div><div class="form-grid"><div class="full"><label>任务标题</label><input id="newTitle" placeholder="例如：生成今日60店经营分析"></div><div><label>优先级</label><input id="newPriority" placeholder="normal"></div><div><label>父任务ID</label><input id="newParentTaskId" type="number" placeholder="可不填"></div><div class="full"><label>任务描述</label><textarea id="newDescription"></textarea></div><div class="full"><label>拆分计划</label><textarea id="newSplitPlan" placeholder="可不填；填写后后端状态为 split"></textarea></div></div><div class="actions" style="margin-top:12px"><button onclick="createTask()">保存任务</button></div></div></div><script>
const STATUSES=['created','split','assigned','running','result_submitted','accepted','rejected','audited','summarized'];const menus=[['老板驾驶舱','/index.html'],['老板控制中心','/control.html'],['店铺管理','/stores.html'],['京东60店数据中心','/jd-dashboard.html'],['京东数据接入','/jd-integrations.html'],['AI员工工作台','/employee-workspace.html'],['AI员工能力档案','/employee-capabilities.html'],['多模型路由中心','/model-routing.html'],['AI工具调用权限中心','/tool-permissions.html'],['SOP / Skill 绑定中心','/sop-skill-center.html'],['AI执行日志中心','/employee-activity-log.html'],['AI执行追溯中心','/employee-activity-trace.html'],['AI任务中心','/task-center.html'],['AI自动派单中心','/orchestrator.html'],['广告中心','/ads.html'],['今日数据录入','/metrics.html'],['Excel导入','/import.html'],['AI素材中心','/ai-assets.html'],['AI工作流中心','/workflows.html'],['AI员工名册','/ai-employees.html'],['账号资料中心','/account-center.html'],['模板中心','/template-center.html'],['品牌中心','/brands.html'],['店铺分组','/store-groups.html'],['系统设置','/settings.html']];let tasks=[],selectedTask=null,aiEmployees=[];function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function fmt(v){return v?String(v).slice(0,19).replace('T',' '):'-'}function tag(s){return `<span class="tag ${esc(s)}">${esc(s)}</span>`}function renderMenu(){menu.innerHTML=menus.map(([l,h])=>`<a class="${h==='/task-center.html'?'active':''}" href="${h}">${l}</a>`).join('')}function tick(){time.innerText=new Date().toLocaleString('zh-CN',{hour12:false})}function clearAuth(){try{localStorage.removeItem('token');localStorage.removeItem('tiantong_token');localStorage.removeItem('session');localStorage.removeItem('tiantong_session');sessionStorage.clear()}catch(e){}}async function logout(){clearAuth();try{await fetch('/api/logout',{method:'POST',credentials:'include'})}catch(e){}location.href='/login.html'}async function api(url,opt={}){let r;try{r=await fetch(url,{credentials:'include',...opt})}catch(e){throw new Error('网络异常，请检查连接。')}if(r.status===401){clearAuth();location.href='/login.html';throw new Error('登录过期，请重新登录。')}const d=r.ok?null:await r.json().catch(()=>({}));if(r.status===403)throw new Error(d&&d.detail||'当前账号无权使用该功能。');if(r.status===404)throw new Error(d&&d.detail||'分析记录或任务不存在。');if(r.status===422)throw new Error(d&&d.detail||'输入字段不完整或格式错误。');if(r.status>=500)throw new Error(d&&d.detail||'系统异常，请稍后重试。');if(!r.ok)throw new Error(d&&d.detail||'操作失败');return r.json()}async function init(){renderMenu();STATUSES.forEach(s=>statusFilter.insertAdjacentHTML('beforeend',`<option value="${s}">${s}</option>`));tick();setInterval(tick,1000);const user=await api('/api/me');me.innerText=`${user.display_name||user.username||'当前用户'} · ${user.role_label||user.role}`;const h=await fetch('/api/health').then(r=>r.json()).catch(()=>null);systemStatus.innerText=h?`服务器正常 · 数据库 ${h.database} · Redis ${h.redis}`:'系统状态获取失败';await loadAiEmployees();await loadTasks()}async function loadAiEmployees(){try{aiEmployees=await api('/api/ai-employees?status=active&include_legacy=false')}catch(e){aiEmployees=[]}}async function loadTasks(){try{pageState.className='state';pageState.innerText='正在加载任务...';const qs=statusFilter.value?`?status=${encodeURIComponent(statusFilter.value)}`:'';tasks=await api(`/api/task-center/tasks${qs}`);renderTasks()}catch(e){pageState.className='state error';pageState.innerText=e.message;taskRows.innerHTML='<tr><td colspan="7">加载失败，请刷新重试</td></tr>'}}function renderTasks(){const q=search.value.trim().toLowerCase();const rows=tasks.filter(t=>!q||[t.title,t.description,t.assigned_ai_employee_code,t.assigned_ai_employee_name,t.created_by&&t.created_by.display_name].join(' ').toLowerCase().includes(q));pageState.className='state';pageState.innerText=rows.length?`已显示 ${rows.length} / ${tasks.length} 个任务。`:'暂无符合条件的任务。';taskRows.innerHTML=rows.length?rows.map(t=>`<tr><td>${t.id}</td><td><strong>${esc(t.title)}</strong><div class="muted">${esc(t.description||'')}</div></td><td>${tag(t.status)}</td><td>${t.created_by?esc(t.created_by.display_name):'-'}<br><span class="muted">${esc(t.assigned_ai_employee_name||t.assigned_ai_employee_code||'未分配')}</span></td><td>${esc(t.priority||'normal')}</td><td>${fmt(t.created_at)}</td><td><button class="secondary" onclick="loadDetail(${t.id})">详情</button></td></tr>`).join(''):'<tr><td colspan="7">暂无任务</td></tr>'}async function loadDetail(id){try{selectedTask=await api(`/api/task-center/tasks/${id}`);const [logs,links]=await Promise.all([api(`/api/task-center/tasks/${id}/audit-logs`),loadOrchestratorLinks(id)]);renderDetail(selectedTask,logs,links)}catch(e){alert(e.message)}}async function loadOrchestratorLinks(id){try{return await api(`/api/task-center/tasks/${id}/orchestrator-links`)}catch(e){return {error:e.message,links:[]}}}function aiOptions(){return aiEmployees.map(a=>`<option value="${esc(a.employee_code)}">${esc((a.employee_name||a.employee_code)+'（'+(a.employee_code||'')+'）- '+(a.legion||'未设置军团'))}</option>`).join('')}function normalizeLinks(p){if(Array.isArray(p))return p;if(p&&Array.isArray(p.links))return p.links;if(p&&Array.isArray(p.items))return p.items;return []}function boolText(v){return v===true?'\u662f':(v===false?'\u5426':'-')}function safetyText(v){if(Array.isArray(v)&&v.length)return v.map(esc).join('\u3001');if(typeof v==='string'&&v.trim())return esc(v);return '\u6682\u65e0\u5b89\u5168\u6807\u8bb0'}function renderLinks(p){if(p&&p.error)return `<div class="state error">${esc(p.error)}</div>`;const links=normalizeLinks(p);if(!links.length)return '<div class="muted">\u6682\u65e0 Orchestrator \u6765\u6e90\u94fe\u8def\u3002</div>';return links.map(l=>{const a=l.analysis||{},detectedName=a.detected_employee_name||l.detected_employee_name||'-',detectedSprint=a.detected_sprint||l.detected_sprint||'-',detectedStage=a.detected_stage||l.detected_stage||'-',completionStatus=a.completion_status||l.completion_status||'-',hasBlocker=a.has_blocker??l.has_blocker??'-',needsFix=a.needs_fix??l.needs_fix??'-',safetyFlags=a.safety_flags??l.safety_flags;return `<div class="link-card"><div class="link-grid"><div>link_id</div><div class="mono">${esc(l.link_id||l.id||'-')}</div><div>analysis_record_id</div><div class="mono">${esc(l.analysis_record_id||'-')}</div><div>link_type</div><div>${esc(l.link_type||'-')}</div><div>recommended_codex</div><div class="mono">${esc(l.recommended_codex||'-')}</div><div>recommended_action</div><div>${esc(l.recommended_action||'-')}</div><div>source_stage</div><div>${esc(l.source_stage||'-')}</div><div>confidence</div><div>${esc(l.confidence||'-')}</div><div>note</div><div>${esc(l.note||'-')}</div><div>created_at</div><div>${fmt(l.created_at)}</div><div>detected_employee_name</div><div>${esc(detectedName)}</div><div>detected_sprint</div><div>${esc(detectedSprint)}</div><div>detected_stage</div><div>${esc(detectedStage)}</div><div>completion_status</div><div>${esc(completionStatus)}</div><div>has_blocker</div><div>${boolText(hasBlocker)}</div><div>needs_fix</div><div>${boolText(needsFix)}</div><div>safety_flags</div><div>${safetyText(safetyFlags)}</div></div></div>`}).join('')}function renderDetail(t,logs,links){detailPanel.innerHTML=`<div class="actions" style="justify-content:space-between"><div><h2>${esc(t.title)}</h2><div class="muted">#${t.id} · ${tag(t.status)} · 优先级：${esc(t.priority||'normal')}</div></div><button class="secondary" onclick="clearDetail()">清空</button></div><div class="section-title">任务说明</div><div class="muted">${esc(t.description||'暂无说明')}</div><div class="section-title">Orchestrator 来源链路</div><div class="muted">只读展示来源记录，不展示完整原文、敏感摘录或 Prompt 草稿，不提供状态修改操作。</div>${renderLinks(links)}<div class="section-title">分配AI员工</div><input id="assignCode" list="aiEmployeeOptions" placeholder="AI员工code" value="${esc(t.assigned_ai_employee_code||'')}"><datalist id="aiEmployeeOptions">${aiOptions()}</datalist><input id="assignName" placeholder="AI员工名称，可选" value="${esc(t.assigned_ai_employee_name||'')}"><input id="assignDetail" placeholder="分配说明，可选"><div class="actions"><button onclick="assignTask(${t.id})">分配AI员工</button><button class="secondary" onclick="startTask(${t.id})">开始任务</button></div><div class="section-title">更新任务状态</div><select id="statusUpdate">${STATUSES.map(s=>`<option value="${s}" ${s===t.status?'selected':''}>${s}</option>`).join('')}</select><input id="statusDetail" placeholder="状态变更说明，可选"><div class="actions"><button class="secondary" onclick="updateStatus(${t.id})">更新状态</button></div><div class="section-title">AI员工提交结果</div><textarea id="resultContent" placeholder="填写AI员工执行结果"></textarea><input id="resultAttachments" placeholder="附件，多个用逗号分隔，可选"><div class="actions"><button onclick="submitResult(${t.id})">提交结果</button></div><div class="section-title">天检验收</div><select id="reviewStatus"><option value="accepted">accepted</option><option value="rejected">rejected</option></select><textarea id="reviewComment" placeholder="天检验收意见"></textarea><div class="actions"><button class="good" onclick="submitReview(${t.id})">提交验收</button></div><div class="section-title">天监审计</div><textarea id="auditComment" placeholder="天监审计意见"></textarea><div class="actions"><button class="warn" onclick="submitAudit(${t.id})">提交审计</button></div><div class="section-title">天统汇总</div><textarea id="summaryContent" placeholder="天统汇总内容">${esc(t.summary||'')}</textarea><div class="actions"><button onclick="submitSummary(${t.id})">提交汇总</button></div><div class="section-title">结果记录</div>${(t.results||[]).map(r=>`<div class="entry"><strong>${esc(r.ai_employee_name||r.ai_employee_code)}</strong><div class="muted">${fmt(r.created_at)}</div><div>${esc(r.result_content)}</div></div>`).join('')||'<div class="muted">暂无结果</div>'}<div class="section-title">验收/审计记录</div>${(t.reviews||[]).map(r=>`<div class="entry"><strong>${esc(r.review_type)} · ${esc(r.review_status)}</strong><div class="muted">${fmt(r.created_at)} · ${esc(r.reviewer_role||'')}</div><div>${esc(r.comment||'')}</div></div>`).join('')||'<div class="muted">暂无记录</div>'}<div class="section-title">审计日志</div>${(logs||[]).map(l=>`<div class="log"><strong>${esc(l.action)}</strong><div class="muted">${fmt(l.created_at)} · ${esc(l.from_status||'-')} → ${esc(l.to_status||'-')} · ${esc(l.actor_role||'')}</div><div>${esc(l.detail||'')}</div></div>`).join('')||'<div class="muted">暂无审计日志</div>'}`}function clearDetail(){selectedTask=null;detailPanel.innerHTML='<div class="actions" style="justify-content:space-between"><h2>任务详情</h2><button class="secondary" onclick="clearDetail()">清空</button></div><div class="muted">从左侧任务列表选择一条任务查看详情。</div>'}function openCreateModal(){createModal.classList.add('open')}function closeCreateModal(){createModal.classList.remove('open')}async function createTask(){try{const body={title:newTitle.value.trim(),description:newDescription.value.trim(),priority:newPriority.value.trim()||'normal',split_plan:newSplitPlan.value.trim()||null};if(newParentTaskId.value)body.parent_task_id=Number(newParentTaskId.value);await api('/api/task-center/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});closeCreateModal();newTitle.value=newDescription.value=newPriority.value=newParentTaskId.value=newSplitPlan.value='';await loadTasks()}catch(e){alert(e.message)}}async function updateStatus(id){try{await api(`/api/task-center/tasks/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:statusUpdate.value,detail:statusDetail.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function assignTask(id){try{const code=assignCode.value.trim();if(!code){alert('请选择AI员工');return}const sel=aiEmployees.find(e=>e.employee_code===code);await api(`/api/task-center/tasks/${id}/assign`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ai_employee_code:code,ai_employee_name:assignName.value.trim()||(sel&&sel.employee_name)||null,detail:assignDetail.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function startTask(id){try{await api(`/api/task-center/tasks/${id}/start`,{method:'POST'});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function submitResult(id){try{const content=resultContent.value.trim();if(!content){alert('请填写结果内容');return}const attachments=resultAttachments.value.split(',').map(s=>s.trim()).filter(Boolean);await api(`/api/task-center/tasks/${id}/results`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({result_content:content,attachments})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function submitReview(id){try{await api(`/api/task-center/tasks/${id}/reviews`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({review_status:reviewStatus.value,comment:reviewComment.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function submitAudit(id){try{await api(`/api/task-center/tasks/${id}/audits`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({review_status:'audited',comment:auditComment.value.trim()||null})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}async function submitSummary(id){try{const summary=summaryContent.value.trim();if(!summary){alert('请填写汇总内容');return}await api(`/api/task-center/tasks/${id}/summary`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary})});await loadTasks();await loadDetail(id)}catch(e){alert(e.message)}}init().catch(e=>{pageState.className='state error';pageState.innerText=e.message||'页面加载失败'});
</script></body></html>
