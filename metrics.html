<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>今日数据录入中心 - 天统AI云中台</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; background:#f5f7fb; margin:0; }
    .header { background:#101827; color:white; padding:24px 40px; display:flex; justify-content:space-between; align-items:center; }
    .wrap { padding:30px 40px; }
    .card { background:white; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.06); margin-bottom:20px; }
    input, select { padding:12px; border:1px solid #cbd5e1; border-radius:8px; margin:6px 8px 6px 0; min-width:150px; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; background:#101827; color:white; margin-right:6px; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { padding:14px; border-bottom:1px solid #e5e7eb; text-align:left; }
    a { color:white; margin-left:16px; }
    .tip { color:#64748b; line-height:1.8; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>今日店铺数据录入中心</h1>
      <p>先手动录入，后续接京东商智 / 京准通 / 京东开放平台自动同步</p>
    </div>
    <div>
      <span id="me">加载中...</span>
      <a href="/">返回驾驶舱</a>
      <a href="/stores.html">店铺管理</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>录入今日数据</h2>
      <p class="tip">先录入 1 家店铺测试，保存后返回老板驾驶舱，数字就会变化。</p>

      <select id="store_id"></select>
      <input id="metric_date" type="date">
      <input id="sales_amount" type="number" placeholder="今日成交">
      <input id="profit_amount" type="number" placeholder="今日利润">
      <input id="ad_spend" type="number" placeholder="广告花费">
      <input id="roi" type="number" step="0.01" placeholder="ROI">
      <input id="orders_count" type="number" placeholder="订单数">
      <input id="visitors_count" type="number" placeholder="访客数">
      <input id="refunds_count" type="number" placeholder="退款数">
      <input id="after_sales_count" type="number" placeholder="售后数">
      <button onclick="saveMetrics()">保存数据</button>
    </div>

    <div class="card">
      <h2>今日店铺数据列表</h2>
      <table>
        <thead>
          <tr>
            <th>店铺</th>
            <th>成交</th>
            <th>利润</th>
            <th>广告费</th>
            <th>ROI</th>
            <th>订单</th>
            <th>访客</th>
            <th>退款</th>
            <th>售后</th>
          </tr>
        </thead>
        <tbody id="metrics"></tbody>
      </table>
    </div>
  </div>

<script>
async function api(url, options={}) {
  const res = await fetch(url, {credentials:'include', ...options});
  if (res.status === 401) {
    location.href = '/login.html';
    return;
  }
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || '操作失败');
  }
  return await res.json();
}

async function loadMe() {
  const me = await api('/api/me');
  document.getElementById('me').innerText = me.display_name + '｜' + me.role;
  if (!['owner', 'boss'].includes(me.role)) {
    alert('没有数据录入权限');
    location.href = '/';
  }
}

async function loadStores() {
  const stores = await api('/api/stores');
  const select = document.getElementById('store_id');
  select.innerHTML = stores.map(s => `<option value="${s.id}">${s.store_code}｜${s.store_name}</option>`).join('');
}

async function loadMetrics() {
  const list = await api('/api/metrics/today');
  const tbody = document.getElementById('metrics');
  tbody.innerHTML = list.map(m => `
    <tr>
      <td>${m.store_code}｜${m.store_name}</td>
      <td>￥${m.sales_amount}</td>
      <td>￥${m.profit_amount}</td>
      <td>￥${m.ad_spend}</td>
      <td>${m.roi}</td>
      <td>${m.orders_count}</td>
      <td>${m.visitors_count}</td>
      <td>${m.refunds_count}</td>
      <td>${m.after_sales_count}</td>
    </tr>
  `).join('');
}

async function saveMetrics() {
  const data = {
    store_id: Number(document.getElementById('store_id').value),
    metric_date: document.getElementById('metric_date').value,
    sales_amount: Number(document.getElementById('sales_amount').value || 0),
    profit_amount: Number(document.getElementById('profit_amount').value || 0),
    ad_spend: Number(document.getElementById('ad_spend').value || 0),
    roi: Number(document.getElementById('roi').value || 0),
    orders_count: Number(document.getElementById('orders_count').value || 0),
    visitors_count: Number(document.getElementById('visitors_count').value || 0),
    refunds_count: Number(document.getElementById('refunds_count').value || 0),
    after_sales_count: Number(document.getElementById('after_sales_count').value || 0)
  };

  try {
    await api('/api/metrics/manual', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    alert('数据已保存');
    await loadMetrics();
  } catch(e) {
    alert(e.message);
  }
}

document.getElementById('metric_date').value = new Date().toISOString().slice(0,10);

loadMe().then(loadStores).then(loadMetrics);
</script>
</body>
</html>
