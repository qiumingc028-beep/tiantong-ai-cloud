<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>京东店铺管理中心 - 天统AI云中台</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; background:#f5f7fb; margin:0; }
    .header { background:#101827; color:white; padding:24px 40px; display:flex; justify-content:space-between; align-items:center; }
    .wrap { padding:30px 40px; }
    .card { background:white; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.06); margin-bottom:20px; }
    input, select { padding:12px; border:1px solid #cbd5e1; border-radius:8px; margin-right:8px; }
    button { padding:10px 14px; border:0; border-radius:8px; cursor:pointer; background:#101827; color:white; margin-right:6px; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { padding:14px; border-bottom:1px solid #e5e7eb; text-align:left; }
    .green { color:#16a34a; font-weight:bold; }
    .red { color:#dc2626; font-weight:bold; }
    .tip { color:#64748b; }
    a { color:white; margin-left:16px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>京东店铺管理中心</h1>
      <p>60家京东店铺 / 负责人分配 / 后续数据接入</p>
    </div>
    <div>
      <span id="me">加载中...</span>
      <a href="/">返回驾驶舱</a>
      <a href="/control.html">老板控制中心</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>新增店铺</h2>
      <p class="tip">先建立店铺档案，下一步再接京东真实数据。</p>
      <select id="platform">
        <option value="jd">京东</option>
        <option value="tmall">天猫</option>
        <option value="taobao">淘宝</option>
        <option value="pdd">拼多多</option>
        <option value="douyin">抖音</option>
        <option value="tiktok">TikTok</option>
      </select>
      <input id="store_code" placeholder="店铺编号，例如 JD001">
      <input id="store_name" placeholder="店铺名称，例如 京东旗舰店A">
      <input id="notes" placeholder="备注，可不填">
      <button onclick="createStore()">新增店铺</button>
      <button onclick="seedStores()">一键生成京东60店占位</button>
    </div>

    <div class="card">
      <h2>店铺列表</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>平台</th>
            <th>编号</th>
            <th>店铺名称</th>
            <th>负责人</th>
            <th>状态</th>
            <th>备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="stores"></tbody>
      </table>
    </div>
  </div>

<script>
let users = [];

async function api(url, options={}) {
  const res = await fetch(url, {credentials:'include', ...options});
  if (res.status === 401) {
    location.href = '/login.html';
    return;
  }
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || '操作失败');
  }
  return await res.json();
}

function platformName(p) {
  const map = {
    jd: '京东',
    tmall: '天猫',
    taobao: '淘宝',
    pdd: '拼多多',
    douyin: '抖音',
    tiktok: 'TikTok'
  };
  return map[p] || p;
}

async function loadMe() {
  const me = await api('/api/me');
  document.getElementById('me').innerText = me.display_name + '｜' + me.role;
  if (!['owner', 'boss'].includes(me.role)) {
    alert('没有店铺管理权限');
    location.href = '/';
  }
}

async function loadUsers() {
  users = await api('/api/store-users');
}

function userOptions(selectedId) {
  let html = '<option value="">未分配</option>';
  users.forEach(u => {
    const selected = selectedId === u.id ? 'selected' : '';
    html += `<option value="${u.id}" ${selected}>${u.display_name}（${u.username}）</option>`;
  });
  return html;
}

async function loadStores() {
  const stores = await api('/api/stores');
  const tbody = document.getElementById('stores');

  tbody.innerHTML = stores.map(s => `
    <tr>
      <td>${s.id}</td>
      <td>${platformName(s.platform)}</td>
      <td>${s.store_code}</td>
      <td>${s.store_name}</td>
      <td>
        <select onchange="assignStore(${s.id}, this.value)">
          ${userOptions(s.manager ? s.manager.id : null)}
        </select>
      </td>
      <td>${s.active ? '<span class="green">启用</span>' : '<span class="red">停用</span>'}</td>
      <td>${s.notes || ''}</td>
      <td>
        <button onclick="toggleStore(${s.id})">${s.active ? '停用' : '启用'}</button>
      </td>
    </tr>
  `).join('');
}

async function createStore() {
  const data = {
    platform: document.getElementById('platform').value,
    store_code: document.getElementById('store_code').value.trim(),
    store_name: document.getElementById('store_name').value.trim(),
    notes: document.getElementById('notes').value.trim()
  };

  try {
    await api('/api/stores', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    await loadStores();
    alert('店铺已新增');
  } catch(e) {
    alert(e.message);
  }
}

async function seedStores() {
  if (!confirm('确定生成京东60个店铺占位吗？已存在的不会重复创建。')) return;
  try {
    const res = await api('/api/stores/seed-jd', {method:'POST'});
    alert(res.message);
    await loadStores();
  } catch(e) {
    alert(e.message);
  }
}

async function assignStore(storeId, managerUserId) {
  try {
    await api(`/api/stores/${storeId}/assign`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        manager_user_id: managerUserId ? Number(managerUserId) : null
      })
    });
  } catch(e) {
    alert(e.message);
  }
}

async function toggleStore(storeId) {
  try {
    await api(`/api/stores/${storeId}/toggle`, {method:'POST'});
    await loadStores();
  } catch(e) {
    alert(e.message);
  }
}

loadMe().then(loadUsers).then(loadStores);
</script>
</body>
</html>
