name: CI

on:
  push:
    branches:
      - main
      - "sprint*"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile $(find backend tests -name '*.py')

      - name: Run tests
        run: python -m pytest -v tests/

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t tiantong-ai-cloud-backend:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t tiantong-ai-cloud-worker:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t tiantong-ai-cloud-frontend:${{ github.sha }} .
