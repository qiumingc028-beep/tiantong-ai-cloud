services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env.production}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?set POSTGRES_ADMIN_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?set POSTGRES_ADMIN_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:?set POSTGRES_ADMIN_USER} -d ${POSTGRES_DB:?set POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.production}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        REQUIREMENTS_LOCK: ${REQUIREMENTS_LOCK:-artifacts/wheelhouse/linux-amd64-cp312/requirements-linux-amd64-cp312.lock}
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        REQUIREMENTS_LOCK: ${REQUIREMENTS_LOCK:-artifacts/wheelhouse/linux-amd64-cp312/requirements-linux-amd64-cp312.lock}
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    command: ["python", "-m", "backend.worker"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NGINX_CONF: nginx/production.conf
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - nginx_logs:/var/log/nginx
      - ${TLS_CERT_PATH:?set TLS_CERT_PATH in .env.production}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:?set TLS_KEY_PATH in .env.production}:/etc/nginx/certs/privkey.pem:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
